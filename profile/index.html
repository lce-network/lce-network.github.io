<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCE Network | Profile</title>
<link rel="icon" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0c10;
  --surface: rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text:    #e8eaf0;
  --muted:   #7a8090;
  --accent:  #4fc3f7;
  --accent2: #81c784;
  --gold:    #ffd54f;
  --red:     #ef5350;
  --nav-h:   56px;
}

html, body { min-height: 100%; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.5; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }

.panorama-wrap { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.panorama-track { display: flex; height: 100%; animation: panBg 80s linear infinite; will-change: transform; }
.panorama-img { height: 100%; width: auto; min-width: 100vw; object-fit: cover; flex-shrink: 0; filter: blur(3px) brightness(0.38) saturate(0.7); transform: scale(1.04); }
@keyframes panBg { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.panorama-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,12,16,0.3) 0%, rgba(10,12,16,0.1) 40%, rgba(10,12,16,0.55) 100%); }

nav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-h); background: rgba(10,12,16,0.85); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; gap: 32px; z-index: 100; }
.nav-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.nav-logo img { width: 28px; height: 28px; object-fit: contain; }
.nav-logo-text { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.15rem; letter-spacing: 0.04em; }
.nav-links { display: flex; gap: 4px; flex: 1; }
.nav-link { font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.06em; color: var(--muted); padding: 6px 14px; border-radius: 4px; transition: color 0.15s, background 0.15s; }
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--accent); }

.nav-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.nav-search-wrap { position: relative; }
.nav-search { display: flex; align-items: center; background: rgba(255,255,255,0.06); border-radius: 999px; padding: 7px 14px; gap: 8px; border: 1px solid var(--border); transition: border-color .15s, box-shadow .15s; }
.nav-search:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,195,247,0.12); }
.nav-search input { border: none; background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.88rem; color: var(--text); outline: none; width: 140px; }
.nav-search input::placeholder { color: var(--muted); }
.nav-search svg { color: var(--muted); flex-shrink: 0; }
.nav-sr { position: absolute; top: calc(100% + 10px); left: 0; width: 280px; background: #13161e; border: 1px solid var(--border2); border-radius: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); overflow: hidden; opacity: 0; transform: translateY(-8px); pointer-events: none; transition: opacity .15s, transform .15s; z-index: 200; max-height: 360px; overflow-y: auto; }
.nav-sr.show { opacity: 1; transform: translateY(0); pointer-events: all; }
.nav-sr-empty, .nav-sr-loading { padding: 18px 16px; font-size: 0.85rem; color: var(--muted); text-align: center; }
.nav-sr-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; cursor: pointer; transition: background .12s; }
.nav-sr-item:hover { background: rgba(255,255,255,0.05); }
.nav-sr-item img { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; background: var(--surface); flex-shrink: 0; }
.nav-sr-name { font-size: 0.88rem; font-weight: 600; color: var(--text); }
.nav-sr-meta { font-size: 0.74rem; color: var(--muted); }
.nav-sr-footer { padding: 10px 14px; text-align: center; font-size: 0.8rem; font-weight: 600; color: var(--accent); border-top: 1px solid var(--border); cursor: pointer; transition: background .12s; }
.nav-sr-footer:hover { background: rgba(255,255,255,0.04); }
.nav-uw { position: relative; }
.nav-ut { display: flex; align-items: center; gap: 8px; background: transparent; border: 1px solid transparent; border-radius: 999px; padding: 4px 10px 4px 4px; cursor: pointer; transition: background .15s, border-color .15s; }
.nav-ut:hover { background: rgba(255,255,255,0.06); border-color: var(--border); }
.nav-ut img { width: 30px; height: 30px; border-radius: 6px; object-fit: cover; background: var(--surface); flex-shrink: 0; }
.nav-ut .trig-n { font-size: 0.85rem; font-weight: 600; color: var(--text); max-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-ut svg { color: var(--muted); transition: transform .15s; flex-shrink: 0; }
.nav-uw.open .nav-ut svg { transform: rotate(180deg); }
.nav-um { position: absolute; top: calc(100% + 10px); right: 0; width: 220px; background: #13161e; border: 1px solid var(--border2); border-radius: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); overflow: hidden; opacity: 0; transform: translateY(-8px); pointer-events: none; transition: opacity .15s, transform .15s; z-index: 200; }
.nav-uw.open .nav-um { opacity: 1; transform: translateY(0); pointer-events: all; }
.nav-um-hdr { display: flex; align-items: center; gap: 12px; padding: 14px; border-bottom: 1px solid var(--border); }
.nav-um-hdr img { width: 38px; height: 38px; border-radius: 7px; object-fit: cover; background: var(--surface); flex-shrink: 0; }
.nav-um-name { font-size: 0.92rem; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-um-sub { font-size: 0.74rem; color: var(--gold); }
.nav-um-links { padding: 6px; }
.nav-um-link { display: flex; align-items: center; gap: 12px; padding: 9px 10px; border-radius: 5px; font-size: 0.86rem; font-weight: 500; color: var(--text); transition: background .12s; }
.nav-um-link:hover { background: rgba(255,255,255,0.06); }
.nav-um-link svg { color: var(--muted); flex-shrink: 0; }
.nav-um-div { height: 1px; background: var(--border); margin: 6px 0; }
.nav-um-link.danger { color: #ef5350; }
.nav-um-link.danger svg { color: #ef5350; }
.nav-gbtn { background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; padding: 7px 16px; cursor: pointer; transition: color .15s, background .15s; }
.nav-gbtn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.nav-pbtn { background: var(--accent); border: none; border-radius: 6px; color: #000; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 700; padding: 7px 16px; cursor: pointer; transition: opacity .15s; }
.nav-pbtn:hover { opacity: 0.85; }

.page { position: relative; z-index: 1; padding-top: calc(var(--nav-h) + 32px); padding-bottom: 80px; min-height: 100vh; }
.profile-wrap { max-width: 900px; margin: 0 auto; padding: 0 24px; display: flex; flex-direction: column; gap: 16px; animation: fadeUp 0.4s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.panel { background: rgba(10,12,16,0.72); border: 1px solid var(--border); border-radius: 8px; backdrop-filter: blur(12px); overflow: hidden; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.panel-title { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }

.profile-banner { height: 140px; position: relative; overflow: hidden; flex-shrink: 0; background: linear-gradient(135deg, #0d1f2d 0%, #0a2a1a 100%); }
.profile-banner-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.profile-banner::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(10,12,16,0.5) 100%); pointer-events: none; }
.banner-edit-btn { position: absolute; top: 10px; right: 10px; z-index: 2; width: 26px; height: 26px; border-radius: 4px; background: var(--accent); border: 2px solid var(--bg); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: opacity 0.15s; }
.profile-banner:hover .banner-edit-btn { opacity: 1; }
.banner-edit-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2.5; }

.profile-identity { padding: 0 24px 24px; position: relative; }
.profile-avatar-row { display: flex; align-items: flex-end; justify-content: space-between; margin-top: -40px; margin-bottom: 14px; }
.profile-avatar-wrap { position: relative; flex-shrink: 0; }
.profile-avatar-img { width: 80px; height: 80px; border-radius: 8px; border: 3px solid var(--bg); background: var(--surface2); object-fit: cover; display: block; }
.avatar-edit-btn { position: absolute; bottom: -4px; right: -4px; width: 24px; height: 24px; border-radius: 4px; background: var(--accent); border: 2px solid var(--bg); color: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: opacity 0.15s; }
.avatar-edit-btn:hover { opacity: 0.85; }
.avatar-edit-btn svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

.profile-actions { display: flex; align-items: center; gap: 8px; padding-bottom: 2px; }
.profile-role-badge { font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 10px; border-radius: 3px; line-height: 1; }
.role-user      { background: rgba(255,255,255,0.07); color: var(--muted);   border: 1px solid rgba(255,255,255,0.1); }
.role-moderator { background: rgba(129,199,132,0.12); color: var(--accent2); border: 1px solid rgba(129,199,132,0.2); }
.role-admin     { background: rgba(255,213,79,0.12);  color: var(--gold);    border: 1px solid rgba(255,213,79,0.2); }

.profile-gamertag { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; letter-spacing: 0.02em; line-height: 1.1; margin-bottom: 3px; }
.profile-xuid { font-size: 0.72rem; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.04em; margin-bottom: 10px; }
.profile-bio { font-size: 0.88rem; color: #cdd0d8; line-height: 1.5; margin-bottom: 14px; min-height: 1.4em; }
.profile-bio.editable { cursor: pointer; }
.profile-bio.editable:hover { color: var(--text); }
.profile-bio-placeholder { color: var(--muted); font-style: italic; }

.bio-edit-wrap { margin-bottom: 14px; }
.bio-textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 9px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.88rem; resize: vertical; min-height: 72px; outline: none; transition: border-color 0.15s; line-height: 1.5; }
.bio-textarea:focus { border-color: var(--border2); }
.bio-edit-actions { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
.bio-chars { font-size: 0.72rem; color: var(--muted); margin-left: auto; }

.btn-sm { border: none; border-radius: 4px; padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.btn-sm:hover { opacity: 0.82; }
.btn-sm:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-sm.primary    { background: var(--accent); color: #000; }
.btn-sm.ghost      { background: var(--surface); color: var(--muted); border: 1px solid var(--border2); }
.btn-sm.add-friend { background: rgba(79,195,247,0.15); color: var(--accent); border: 1px solid rgba(79,195,247,0.25); }
.btn-sm.friends    { background: rgba(129,199,132,0.1); color: var(--accent2); border: 1px solid rgba(129,199,132,0.2); cursor: default; pointer-events: none; }
.btn-sm.pending    { background: var(--surface); color: var(--muted); border: 1px solid var(--border2); opacity: 0.6; cursor: not-allowed; pointer-events: none; }

.profile-stats-row { display: flex; gap: 0; border-top: 1px solid var(--border); margin-top: 4px; }
.profile-stat { flex: 1; text-align: center; padding: 14px 8px; border-right: 1px solid var(--border); }
.profile-stat:last-child { border-right: none; }
.profile-stat-val { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--gold); line-height: 1; }
.profile-stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-top: 3px; }
.profile-stat-val.date-val { font-size: 1rem; letter-spacing: -0.02em; }

.row-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1px; background: rgba(10,12,16,0.1); }
.row-card { background: rgba(10,12,16,0.72); padding: 14px 18px; display: flex; align-items: center; gap: 12px; transition: background 0.12s; cursor: default; }
.row-card:hover { background: rgba(255,255,255,0.03); }
.row-icon { width: 38px; height: 38px; border-radius: 5px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.row-icon img { width: 100%; height: 100%; object-fit: cover; }
.row-icon.friend-ico { background: var(--surface2); border: 1px solid var(--border2); }
.row-icon.plugin-ico { background: rgba(79,195,247,0.07); border: 1px solid rgba(79,195,247,0.15); }
.row-icon.ach-ico    { background: rgba(255,213,79,0.08); border: 1px solid rgba(255,213,79,0.18); font-size: 1.1rem; }
.row-body { flex: 1; min-width: 0; }
.row-name { font-family: 'Barlow Condensed', sans-serif; font-size: 0.92rem; font-weight: 700; letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-sub  { font-size: 0.73rem; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row-right { font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--gold); flex-shrink: 0; white-space: nowrap; }
.row-right span { font-size: 0.7rem; font-weight: 400; color: var(--muted); }
.row-right.muted { color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 400; }

.empty-state { padding: 32px 20px; text-align: center; color: var(--muted); font-size: 0.84rem; }
.spinner-wrap { padding: 40px; text-align: center; }
.spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast-lcen { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px); background: rgba(13,16,24,0.95); border: 1px solid var(--border2); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.84rem; font-weight: 500; padding: 9px 20px; border-radius: 6px; z-index: 500; opacity: 0; transition: opacity 0.2s, transform 0.2s; pointer-events: none; backdrop-filter: blur(8px); }
.toast-lcen.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Not found page */
.notfound-wrap { max-width: 560px; margin: 0 auto; padding: 0 24px; animation: fadeUp 0.4s ease both; }
.notfound-panel { background: rgba(10,12,16,0.72); border: 1px solid var(--border); border-radius: 8px; backdrop-filter: blur(12px); padding: 40px 32px; text-align: center; }
.notfound-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.5; }
.notfound-title { font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
.notfound-sub { font-size: 0.88rem; color: var(--muted); margin-bottom: 28px; }
.notfound-search { display: flex; gap: 8px; }
.notfound-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border2); border-radius: 6px; padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
.notfound-input:focus { border-color: var(--accent); }
.notfound-input::placeholder { color: var(--muted); }
.notfound-btn { background: var(--accent); border: none; border-radius: 6px; color: #000; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 700; padding: 10px 20px; cursor: pointer; white-space: nowrap; transition: opacity 0.15s; }
.notfound-btn:hover { opacity: 0.85; }
.notfound-results { margin-top: 16px; text-align: left; }
.notfound-result-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 6px; cursor: pointer; transition: background 0.12s; }
.notfound-result-item:hover { background: rgba(255,255,255,0.05); }
.notfound-result-item img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: var(--surface2); flex-shrink: 0; }
.notfound-result-name { font-weight: 600; font-size: 0.9rem; }
.notfound-result-meta { font-size: 0.74rem; color: var(--muted); }
.notfound-searching { padding: 16px; text-align: center; font-size: 0.84rem; color: var(--muted); }

@media (max-width: 640px) {
  .profile-stats-row { flex-wrap: wrap; }
  .profile-stat { flex: 1 1 50%; }
  .profile-stat:nth-child(2) { border-right: none; }
}
</style>
</head>
<body>

<div class="panorama-wrap">
  <div class="panorama-track" id="panoramaTrack">
    <img src="/assets/images/panorama.png" alt="" class="panorama-img" id="panoImg1">
    <img src="/assets/images/panorama.png" alt="" class="panorama-img" id="panoImg2">
  </div>
  <div class="panorama-overlay"></div>
</div>

<div class="toast-lcen" id="lcenToast"></div>

<nav>
  <a href="/" class="nav-logo">
    <img src="/assets/logo.png" alt="LCEN">
    <span class="nav-logo-text">LCE Network</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link"><i style="margin-right:7px;" class="fa-solid fa-arrow-up-right-from-square"></i>Home</a>
    <a href="/dashboard/" class="nav-link">Dashboard</a>
    <a href="/messages/" class="nav-link">Messages</a>
    <a href="/profile/" class="nav-link active">Profile</a>
    <a href="/friends/" class="nav-link">Friends</a>
    <a href="/plugin/" class="nav-link">Plugins</a>
    <a href="/servers/" class="nav-link">Servers</a>
    <a href="/leaderboards/" class="nav-link">Leaderboards</a>
  </div>
  <div class="nav-actions" id="_nav_actions"></div>
</nav>

<div class="page">
  <div id="profileWrap" class="profile-wrap">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
</div>

<script>
const API_BASE = "https://network-server-7kuc.onrender.com";

function tok()  { return localStorage.getItem("lcen_token"); }
function prof() { try { return JSON.parse(localStorage.getItem("lcen_profile")); } catch { return null; } }
function avUrl(xuid) { return `${API_BASE}/avatar/${xuid}`; }

function toast(msg) {
  const t = document.getElementById("lcenToast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

async function api(path, opts = {}) {
  const res = await fetch(`${API_BASE}${path}`, {
    ...opts,
    headers: { "Content-Type": "application/json", "Authorization": `Bearer ${tok()}`, ...(opts.headers || {}) },
  });
  return res.json();
}

function roleClass(role) {
  return { admin: "role-admin", moderator: "role-moderator" }[role] || "role-user";
}

function friendBtnHTML(xuid, friendData) {
  const me = prof();
  if (!me || me.xuid === xuid) return "";
  const isFriend  = friendData?.friends?.includes(xuid);
  const isPending = friendData?.sent?.includes(xuid);
  if (isFriend)  return `<button class="btn-sm friends">Friends</button>`;
  if (isPending) return `<button class="btn-sm pending">Pending</button>`;
  return `<button class="btn-sm add-friend" id="addFriendBtn" data-xuid="${xuid}">Add Friend</button>`;
}

function renderNotFound(query) {
  const wrap = document.getElementById("profileWrap");
  wrap.className = "";
  wrap.style.cssText = "position:relative;z-index:1;padding-top:calc(var(--nav-h) + 32px);padding-bottom:80px;min-height:100vh;";
  wrap.innerHTML = `
    <div class="notfound-wrap">
      <div class="notfound-panel">
        <div class="notfound-icon"><i class="fa-solid fa-user-slash"></i></div>
        <div class="notfound-title">Player not found</div>
        <div class="notfound-sub">${query ? `No player matching "<strong style="color:var(--text)">${query}</strong>" exists.` : "That profile could not be found."} Try searching below.</div>
        <div class="notfound-search">
          <input class="notfound-input" id="nfInput" type="text" placeholder="Search players..." value="${query || ''}" autocomplete="off">
          <button class="notfound-btn" id="nfBtn">Search</button>
        </div>
        <div class="notfound-results" id="nfResults"></div>
      </div>
    </div>`;

  const input = document.getElementById("nfInput");
  const btn   = document.getElementById("nfBtn");
  const results = document.getElementById("nfResults");

  let debounce;

  async function doSearch(q) {
    if (!q || q.length < 2) { results.innerHTML = ""; return; }
    results.innerHTML = `<div class="notfound-searching">Searching...</div>`;
    try {
      const data = await fetch(`${API_BASE}/players/search?q=${encodeURIComponent(q)}&scope=all`, {
        headers: tok() ? { Authorization: `Bearer ${tok()}` } : {}
      }).then(r => r.json());
      const players = Array.isArray(data) ? data : data.results || [];
      if (!players.length) {
        results.innerHTML = `<div class="notfound-searching">No players found.</div>`;
        return;
      }
      results.innerHTML = players.slice(0, 8).map(p => `
        <div class="notfound-result-item" data-gt="${p.gamertag}">
          <img src="${avUrl(p.xuid)}" alt="" onerror="this.style.visibility='hidden'">
          <div>
            <div class="notfound-result-name">${p.gamertag}</div>
            <div class="notfound-result-meta">${(p.gamerscore || 0).toLocaleString()} G</div>
          </div>
        </div>`).join("");
      results.querySelectorAll(".notfound-result-item").forEach(el => {
        el.addEventListener("click", () => { location.href = `/profile/?q=${encodeURIComponent(el.dataset.gt)}`; });
      });
    } catch {
      results.innerHTML = `<div class="notfound-searching">Search failed.</div>`;
    }
  }

  input.addEventListener("input", () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => doSearch(input.value.trim()), 280);
  });
  btn.addEventListener("click", () => doSearch(input.value.trim()));
  input.addEventListener("keydown", e => { if (e.key === "Enter") doSearch(input.value.trim()); });

  // auto-search if there was a query
  if (query) doSearch(query);
}

function renderProfile(profile, isOwn, friendData, friendProfiles, ownedPlugins) {
  const wrap = document.getElementById("profileWrap");
  wrap.className = "profile-wrap";
  const gs = profile.gamerscore || 0;
  const bannerSrc = profile.banner_data
    ? `${API_BASE}/profile/${profile.xuid}/banner${isOwn ? "?t=" + Date.now() : ""}`
    : `/assets/images/panorama.png`;

  wrap.innerHTML = `
    <div class="panel">
      <div class="profile-banner">
        <img class="profile-banner-img" id="profileBannerImg" src="${bannerSrc}" alt="" onerror="this.style.display='none'">
        ${isOwn ? `
          <label class="banner-edit-btn" for="bannerFileInput" title="Change banner">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </label>
          <input type="file" id="bannerFileInput" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;">
        ` : ""}
      </div>

      <div class="profile-identity">
        <div class="profile-avatar-row">
          <div class="profile-avatar-wrap">
            <img class="profile-avatar-img" id="profileAvatarImg" src="${avUrl(profile.xuid)}" alt="${profile.gamertag}" onerror="this.src=''">
            ${isOwn ? `
              <label class="avatar-edit-btn" for="avatarFileInput" title="Change avatar">
                <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              </label>
              <input type="file" id="avatarFileInput" accept="image/jpeg,image/png,image/webp,image/gif" style="display:none;">
            ` : ""}
          </div>
          <div class="profile-actions">
            <span class="profile-role-badge ${roleClass(profile.role)}">${profile.role}</span>
            ${friendBtnHTML(profile.xuid, friendData)}
          </div>
        </div>

        <div class="profile-gamertag">${profile.gamertag}</div>
        <div class="profile-xuid">XUID: ${profile.xuid}</div>

        ${isOwn ? `
          <div id="bioDisplay" class="profile-bio editable" title="Click to edit bio">
            ${profile.bio ? profile.bio : '<span class="profile-bio-placeholder">Click to add a bio...</span>'}
          </div>
          <div id="bioEditWrap" class="bio-edit-wrap" style="display:none;">
            <textarea class="bio-textarea" id="bioTextarea" maxlength="200" placeholder="Write something about yourself...">${profile.bio || ""}</textarea>
            <div class="bio-edit-actions">
              <button class="btn-sm primary" id="bioSaveBtn">Save</button>
              <button class="btn-sm ghost" id="bioCancelBtn">Cancel</button>
              <span class="bio-chars" id="bioChars">${(profile.bio || "").length}/200</span>
            </div>
          </div>
        ` : `
          <div class="profile-bio">${profile.bio || '<span class="profile-bio-placeholder">No bio set.</span>'}</div>
        `}

        <div class="profile-stats-row">
          <div class="profile-stat">
            <div class="profile-stat-val">${gs.toLocaleString()}</div>
            <div class="profile-stat-label">Gamerscore</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-val">${profile.achievements.length}</div>
            <div class="profile-stat-label">Achievements</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-val">${(profile.friends || []).length}</div>
            <div class="profile-stat-label">Friends</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-val date-val">${new Date(profile.createdAt).toLocaleDateString("en-GB")}</div>
            <div class="profile-stat-label">Joined</div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Friends</span>
        <span style="font-size:0.76rem;color:var(--muted);">${(profile.friends || []).length}</span>
      </div>
      ${(profile.friends || []).length === 0
        ? `<div class="empty-state">No friends yet.</div>`
        : `<div class="row-grid" id="friendsGrid"></div>`}
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Plugins</span>
        <span style="font-size:0.76rem;color:var(--muted);">${ownedPlugins.length}</span>
      </div>
      ${ownedPlugins.length === 0
        ? `<div class="empty-state">No plugins published.</div>`
        : `<div class="row-grid" id="pluginsGrid"></div>`}
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Achievements</span>
        <span style="font-size:0.76rem;color:var(--muted);">${profile.achievements.length} unlocked</span>
      </div>
      ${profile.achievements.length === 0
        ? `<div class="empty-state">No achievements unlocked yet.</div>`
        : `<div class="row-grid">${profile.achievements.map(a => `
            <div class="row-card">
              <div class="row-icon ach-ico">${a.icon || "★"}</div>
              <div class="row-body">
                <div class="row-name">${a.title}</div>
                <div class="row-sub">${a.description || ""}</div>
              </div>
              <div class="row-right">${a.gamerscore}<span>G</span></div>
            </div>`).join("")}
          </div>`}
    </div>`;

  const friendsGrid = document.getElementById("friendsGrid");
  if (friendsGrid) {
    friendProfiles.forEach(f => {
      const card = document.createElement("div");
      card.className = "row-card";
      card.innerHTML = `
        <div class="row-icon friend-ico"><img src="${avUrl(f.xuid)}" alt="" onerror="this.src=''"></div>
        <div class="row-body">
          <div class="row-name">${f.gamertag}</div>
          <div class="row-sub">${f.bio || ""}</div>
        </div>`;
      card.style.cursor = "pointer";
      card.addEventListener("click", () => { location.href = `/profile/?xuid=${f.xuid}`; });
      friendsGrid.appendChild(card);
    });
  }

  const pluginsGrid = document.getElementById("pluginsGrid");
  if (pluginsGrid) {
    ownedPlugins.forEach(p => {
      const card = document.createElement("div");
      card.className = "row-card";
      card.innerHTML = `
        <div class="row-icon plugin-ico"><img src="${p.icon_url}" alt="" onerror="this.style.display='none'"></div>
        <div class="row-body">
          <div class="row-name">${p.name}</div>
          <div class="row-sub">${p.short_description || p.category || "No description"}</div>
        </div>
        <div class="row-right muted"><i class="fa-solid fa-download"></i> ${p.downloads || 0}</div>`;
      card.style.cursor = "pointer";
      card.addEventListener("click", () => { location.href = `/plugin/view/?id=${p._id}`; });
      pluginsGrid.appendChild(card);
    });
  }

  if (isOwn) {
    const bioDisplay   = document.getElementById("bioDisplay");
    const bioEditWrap  = document.getElementById("bioEditWrap");
    const bioTextarea  = document.getElementById("bioTextarea");
    const bioSaveBtn   = document.getElementById("bioSaveBtn");
    const bioCancelBtn = document.getElementById("bioCancelBtn");
    const bioChars     = document.getElementById("bioChars");

    bioDisplay.addEventListener("click", () => {
      bioDisplay.style.display = "none";
      bioEditWrap.style.display = "block";
      bioTextarea.focus();
      bioTextarea.setSelectionRange(bioTextarea.value.length, bioTextarea.value.length);
    });
    bioTextarea.addEventListener("input", () => { bioChars.textContent = `${bioTextarea.value.length}/200`; });
    bioCancelBtn.addEventListener("click", () => {
      bioEditWrap.style.display = "none";
      bioDisplay.style.display = "";
      bioTextarea.value = profile.bio || "";
    });
    bioSaveBtn.addEventListener("click", async () => {
      bioSaveBtn.disabled = true; bioSaveBtn.textContent = "Saving...";
      try {
        const updated = await api("/me", { method: "PATCH", body: JSON.stringify({ bio: bioTextarea.value.trim() }) });
        profile.bio = updated.bio;
        localStorage.setItem("lcen_profile", JSON.stringify(updated));
        bioDisplay.innerHTML = updated.bio || '<span class="profile-bio-placeholder">Click to add a bio...</span>';
        bioEditWrap.style.display = "none"; bioDisplay.style.display = "";
        toast("Bio updated");
      } catch (e) { toast(e.message || "Failed to save bio"); }
      bioSaveBtn.disabled = false; bioSaveBtn.textContent = "Save";
    });

    const avatarInput = document.getElementById("avatarFileInput");
    if (avatarInput) {
      avatarInput.addEventListener("change", async () => {
        const file = avatarInput.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append("avatar", file);
        try {
          const res = await fetch(`${API_BASE}/me/avatar`, { method: "POST", headers: { Authorization: `Bearer ${tok()}` }, body: formData });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Upload failed");
          document.getElementById("profileAvatarImg").src = data.avatar + "?t=" + Date.now();
          const cached = prof();
          if (cached) { cached.avatar = data.avatar; localStorage.setItem("lcen_profile", JSON.stringify(cached)); }
          toast("Avatar updated");
        } catch (e) { toast(e.message || "Upload failed"); }
        avatarInput.value = "";
      });
    }

    const bannerInput = document.getElementById("bannerFileInput");
    if (bannerInput) {
      bannerInput.addEventListener("change", async () => {
        const file = bannerInput.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append("banner", file);
        try {
          const res = await fetch(`${API_BASE}/me/banner`, { method: "POST", headers: { Authorization: `Bearer ${tok()}` }, body: formData });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Upload failed");
          document.getElementById("profileBannerImg").src = data.banner + "?t=" + Date.now();
          toast("Banner updated");
        } catch (e) { toast(e.message || "Upload failed"); }
        bannerInput.value = "";
      });
    }
  }

  const addBtn = document.getElementById("addFriendBtn");
  if (addBtn) {
    addBtn.addEventListener("click", async () => {
      addBtn.disabled = true; addBtn.textContent = "...";
      try {
        await api(`/friends/request/${addBtn.dataset.xuid}`, { method: "POST" });
        addBtn.textContent = "Pending"; addBtn.className = "btn-sm pending";
        toast("Friend request sent!");
      } catch (e) {
        toast(e.message || "Failed to send request");
        addBtn.disabled = false; addBtn.textContent = "Add Friend";
      }
    });
  }
}

async function init() {
  const params = new URLSearchParams(location.search);
  const q    = params.get("q");
  const xuid = params.get("xuid");

  let profile      = null;
  let isOwn        = false;
  let friendData   = null;
  let friendProfiles = [];
  let ownedPlugins = [];

  try {
    if (q) {
      const data = await api(`/profile/${encodeURIComponent(q)}`);
      if (data.error) { renderNotFound(q); return; }
      profile = data;
      const me = prof();
      isOwn = !!tok() && !!me && me.gamertag.toLowerCase() === profile.gamertag.toLowerCase();
    } else if (xuid) {
      const data = await api(`/profile/xuid/${encodeURIComponent(xuid)}`);
      if (data.error) { renderNotFound(null); return; }
      profile = data;
      const me = prof();
      isOwn = !!tok() && !!me && me.xuid === profile.xuid;
    } else {
      if (!tok()) { location.href = "/login/"; return; }
      profile = await api("/me");
      localStorage.setItem("lcen_profile", JSON.stringify(profile));
      isOwn = true;
    }
  } catch (e) {
    renderNotFound(q || null);
    return;
  }

  if (!isOwn && tok()) {
    try {
      friendData = await api("/friends/requests");
      const fl = await api("/friends");
      friendData.friends = fl.map(f => f.xuid);
    } catch {}
  }

  if ((profile.friends || []).length > 0 && tok()) {
    try {
      const results = await Promise.allSettled(profile.friends.map(fxuid => api(`/profile/xuid/${fxuid}`)));
      friendProfiles = results.filter(r => r.status === "fulfilled" && r.value && !r.value.error).map(r => r.value);
    } catch {}
  }

  try {
    const allPlugins = await fetch(`${API_BASE}/plugins`).then(r => r.json());
    ownedPlugins = Array.isArray(allPlugins) ? allPlugins.filter(p => p.ownerXuid === profile.xuid) : [];
  } catch {}

  renderProfile(profile, isOwn, friendData, friendProfiles, ownedPlugins);
}

(function setupPanorama() {
  const track = document.getElementById("panoramaTrack");
  const img1  = document.getElementById("panoImg1");
  function onLoad() {
    const scale = (window.innerHeight * 1.04) / img1.naturalHeight;
    const displayW = img1.naturalWidth * scale;
    img1.style.width = `${displayW}px`; img1.style.minWidth = "unset";
    document.getElementById("panoImg2").style.width = `${displayW}px`;
    document.getElementById("panoImg2").style.minWidth = "unset";
    const dur = displayW / 40;
    const style = document.createElement("style");
    style.textContent = `@keyframes panBg { 0% { transform: translateX(0); } 100% { transform: translateX(-${displayW}px); } }`;
    document.head.appendChild(style);
    track.style.animation = "none"; track.offsetHeight;
    track.style.animation = `panBg ${dur}s linear infinite`;
  }
  if (img1.complete) onLoad(); else img1.addEventListener("load", onLoad);
})();

init();

(function() {
  const API = "https://network-server-7kuc.onrender.com";
  function tok()  { return localStorage.getItem("lcen_token"); }
  function prof() { try { return JSON.parse(localStorage.getItem("lcen_profile")); } catch { return null; } }
  function avUrl(xuid) { return API + "/avatar/" + xuid; }
  let _sd = null, _sa = null;

  function buildSearch(el) {
    const wrap = document.createElement("div");
    wrap.className = "nav-search-wrap";
    wrap.innerHTML = '<div class="nav-search"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input type="text" placeholder="Search players..." id="_nsi" autocomplete="off"></div><div class="nav-sr" id="_nsr"></div>';
    el.appendChild(wrap);
    const inp = wrap.querySelector("#_nsi"), res = wrap.querySelector("#_nsr");
    inp.addEventListener("input", e => {
      const q = e.target.value.trim();
      clearTimeout(_sd);
      if (!q) { res.classList.remove("show"); res.innerHTML = ""; return; }
      _sd = setTimeout(() => doSearch(q, res), 250);
    });
    inp.addEventListener("keydown", e => {
      if (e.key === "Enter") { const q = inp.value.trim(); if (q) location.href = "/profile/?q=" + encodeURIComponent(q); }
      if (e.key === "Escape") { res.classList.remove("show"); inp.blur(); }
    });
    inp.addEventListener("focus", () => { if (res.innerHTML.trim()) res.classList.add("show"); });
    document.addEventListener("click", e => { if (!wrap.contains(e.target)) res.classList.remove("show"); });
  }

  async function doSearch(q, res) {
    res.innerHTML = '<div class="nav-sr-loading">Searching...</div>';
    res.classList.add("show");
    if (_sa) _sa.abort();
    _sa = new AbortController();
    try {
      let players = [];
      try {
        const d = await fetch(API + "/players/search?q=" + encodeURIComponent(q) + "&scope=all", { signal: _sa.signal, headers: tok() ? { Authorization: "Bearer " + tok() } : {} }).then(r => r.json());
        players = Array.isArray(d) ? d : d.results || [];
      } catch { players = []; }
      if (!players.length) {
        res.innerHTML = '<div class="nav-sr-empty">No players found for "' + q + '".</div><div class="nav-sr-footer" id="_nsall">View full search</div>';
      } else {
        res.innerHTML = players.slice(0, 6).map(p => '<div class="nav-sr-item" data-gt="' + p.gamertag + '"><img src="' + avUrl(p.xuid) + '" onerror="this.style.visibility=\'hidden\'"><div><div class="nav-sr-name">' + p.gamertag + '</div><div class="nav-sr-meta">' + (p.gamerscore || 0) + ' G</div></div></div>').join("") + '<div class="nav-sr-footer" id="_nsall">View full search</div>';
        res.querySelectorAll(".nav-sr-item").forEach(it => it.addEventListener("click", () => location.href = "/profile/?q=" + encodeURIComponent(it.dataset.gt)));
      }
      const va = res.querySelector("#_nsall");
      if (va) va.addEventListener("click", () => location.href = "/profile/?q=" + encodeURIComponent(q));
    } catch (e) { if (e.name === "AbortError") return; res.innerHTML = '<div class="nav-sr-empty">No results.</div>'; }
  }

  function buildUserMenu(el, p) {
    const av = avUrl(p.xuid);
    const wrap = document.createElement("div");
    wrap.className = "nav-uw";
    wrap.innerHTML = '<button class="nav-ut"><img src="' + av + '" onerror="this.style.visibility=\'hidden\'"><span class="trig-n">' + p.gamertag + '</span><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button><div class="nav-um"><div class="nav-um-hdr"><img src="' + av + '" onerror="this.style.visibility=\'hidden\'"><div><div class="nav-um-name">' + p.gamertag + '</div><div class="nav-um-sub">' + (p.gamerscore || 0) + ' G</div></div></div><div class="nav-um-links"><a href="/profile/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</a><a href="/dashboard/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Dashboard</a><a href="/friends/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Friends</a><a href="/messages/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Messages</a><a href="/plugin/manage" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>Manage Plugins</a><div class="nav-um-div"></div><a href="#" class="nav-um-link danger" id="_nsout"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>Sign Out</a></div></div>';
    wrap.querySelector(".nav-ut").addEventListener("click", e => { e.stopPropagation(); wrap.classList.toggle("open"); });
    document.addEventListener("click", e => { if (!wrap.contains(e.target)) wrap.classList.remove("open"); });
    wrap.querySelector("#_nsout").addEventListener("click", e => { e.preventDefault(); localStorage.removeItem("lcen_token"); localStorage.removeItem("lcen_profile"); location.href = "/"; });
    el.appendChild(wrap);
  }

  function buildNav() {
    const el = document.getElementById("_nav_actions");
    if (!el) return;
    el.innerHTML = "";
    buildSearch(el);
    const p = prof();
    if (p) {
      buildUserMenu(el, p);
    } else {
      const si = document.createElement("button"); si.className = "nav-gbtn"; si.textContent = "Sign In"; si.onclick = () => location.href = "/login/";
      const rg = document.createElement("button"); rg.className = "nav-pbtn"; rg.textContent = "Register"; rg.onclick = () => location.href = "/register/";
      el.appendChild(si); el.appendChild(rg);
    }
  }

  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", buildNav);
  else buildNav();
})();
