<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCE Network | Manage Plugins</title>
<link rel="icon" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0a0c10; --surface:rgba(255,255,255,0.04); --surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.14);
  --text:#e8eaf0; --muted:#7a8090; --accent:#4fc3f7; --accent2:#81c784;
  --gold:#ffd54f; --red:#ef5350; --amber:#ffb300; --nav-h:56px;
}
html,body{min-height:100%;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.5;overflow-x:hidden;}
a{color:inherit;text-decoration:none;}
.panorama-wrap{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.panorama-track{display:flex;height:100%;will-change:transform;}
.panorama-img{height:100%;width:auto;min-width:100vw;object-fit:cover;flex-shrink:0;filter:blur(3px) brightness(0.38) saturate(0.7);transform:scale(1.04);}
.panorama-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,12,16,0.3) 0%,rgba(10,12,16,0.1) 40%,rgba(10,12,16,0.55) 100%);}
nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);background:rgba(10,12,16,0.85);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:32px;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.nav-logo img{width:28px;height:28px;object-fit:contain;}
.nav-logo-text{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.15rem;letter-spacing:0.04em;}
.nav-links{display:flex;gap:4px;flex:1;}
.nav-link{font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;letter-spacing:0.06em;color:var(--muted);padding:6px 14px;border-radius:4px;transition:color .15s,background .15s;}
.nav-link:hover{color:var(--text);background:var(--surface);}
.nav-link.active{color:var(--accent);}
.nav-user{display:flex;align-items:center;gap:10px;cursor:pointer;}
.nav-avatar{width:32px;height:32px;border-radius:4px;background:var(--surface);border:1px solid var(--border2);overflow:hidden;flex-shrink:0;}
.nav-avatar img{width:100%;height:100%;object-fit:cover;}
.nav-gamertag{font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.9rem;letter-spacing:0.04em;}
.nav-gs{font-size:0.78rem;color:var(--gold);font-weight:500;}
.page{position:relative;z-index:1;padding-top:calc(var(--nav-h) + 28px);padding-bottom:80px;min-height:100vh;}
.wrap{max-width:1060px;margin:0 auto;padding:0 24px;display:flex;flex-direction:column;gap:14px;animation:fadeUp .4s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.panel{background:rgba(10,12,16,0.72);border:1px solid var(--border);border-radius:8px;backdrop-filter:blur(12px);overflow:hidden;}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:rgba(10,12,16,0.72);border:1px solid var(--border);border-radius:8px;backdrop-filter:blur(12px);}
.page-title{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:0.02em;}
.page-subtitle{font-size:0.78rem;color:var(--muted);}
.header-actions{display:flex;gap:10px;align-items:center;}
.btn-primary{background:rgba(79,195,247,0.12);border:1px solid rgba(79,195,247,0.28);border-radius:5px;color:var(--accent);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:0.06em;padding:8px 16px;cursor:pointer;transition:background .15s;display:inline-flex;align-items:center;gap:7px;}
.btn-primary:hover{background:rgba(79,195,247,0.2);}
.stats-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.stat-tile{background:rgba(10,12,16,0.72);border:1px solid var(--border);border-radius:8px;backdrop-filter:blur(12px);padding:18px 20px;display:flex;align-items:center;gap:14px;}
.stat-icon{width:40px;height:40px;border-radius:6px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.stat-icon.dl{background:rgba(79,195,247,0.08);color:var(--accent);}
.stat-icon.lk{background:rgba(239,83,80,0.08);color:var(--red);}
.stat-icon.pub{background:rgba(129,199,132,0.08);color:var(--accent2);}
.stat-val{font-family:'Rajdhani',sans-serif;font-size:1.65rem;font-weight:700;letter-spacing:0.01em;line-height:1;}
.stat-lbl{font-size:0.73rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:2px;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);}
.tab-item{font-family:'DM Sans',sans-serif;font-size:0.84rem;font-weight:600;letter-spacing:0.04em;color:var(--muted);padding:12px 20px;cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:8px;}
.tab-item:hover{color:var(--text);}
.tab-item.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-count{font-size:0.7rem;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 6px;color:var(--muted);}
.plugin-row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative;}
.plugin-row:last-child{border-bottom:none;}
.plugin-row:hover{background:rgba(255,255,255,0.025);}
.row-accent{position:absolute;left:0;top:0;bottom:0;width:3px;}
.row-accent.vis-private{background:var(--red);}
.row-accent.vis-unlisted{background:var(--amber);}
.plugin-icon{width:44px;height:44px;border-radius:6px;border:1px solid var(--border);overflow:hidden;flex-shrink:0;background:var(--surface);}
.plugin-icon img{width:100%;height:100%;object-fit:cover;display:block;}
.plugin-info{flex:1;min-width:0;}
.plugin-name{font-family:'DM Sans',sans-serif;font-size:0.94rem;font-weight:700;letter-spacing:0.01em;margin-bottom:2px;}
.plugin-desc{font-size:0.79rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.plugin-meta{display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;}
.meta-date{font-size:0.73rem;color:var(--muted);}
.meta-badge{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:2px 7px;border-radius:3px;}
.badge-cat{background:rgba(255,255,255,0.07);color:var(--muted);}
.badge-unlisted{background:rgba(255,179,0,0.1);color:var(--amber);border:1px solid rgba(255,179,0,0.2);}
.badge-private{background:rgba(239,83,80,0.1);color:var(--red);border:1px solid rgba(239,83,80,0.2);}
.plugin-stats{display:flex;align-items:center;gap:18px;flex-shrink:0;}
.pstat{display:flex;flex-direction:column;align-items:center;}
.pstat-val{font-family:'Rajdhani',sans-serif;font-size:1.05rem;font-weight:700;line-height:1.1;}
.pstat-lbl{font-size:0.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.pstat-sep{width:1px;height:28px;background:var(--border);}
.row-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px;}
.row-btn{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.76rem;font-weight:600;padding:5px 12px;cursor:pointer;transition:all .12s;letter-spacing:0.04em;}
.row-btn:hover{background:var(--surface2);color:var(--text);}
.row-btn.danger:hover{border-color:rgba(239,83,80,0.4);color:var(--red);background:rgba(239,83,80,0.07);}
.row-btn.accent{color:var(--accent);border-color:rgba(79,195,247,0.25);background:rgba(79,195,247,0.07);}
.row-btn.accent:hover{background:rgba(79,195,247,0.15);}
.new-plugin-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;color:var(--muted);font-size:0.84rem;font-weight:500;border-top:1px dashed var(--border);cursor:pointer;transition:all .12s;}
.new-plugin-row:hover{color:var(--accent);background:rgba(79,195,247,0.03);}
.sub-card{display:flex;gap:0;border-bottom:1px solid var(--border);transition:background .12s;}
.sub-card:last-child{border-bottom:none;}
.sub-card:hover{background:rgba(255,255,255,0.02);}
.sub-card-main{flex:1;padding:13px 18px;min-width:0;}
.sub-name{font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:700;margin-bottom:2px;}
.sub-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:5px;}
.sub-badge{font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;padding:2px 7px;border-radius:3px;}
.sub-badge.pending{background:rgba(255,179,0,0.1);color:var(--amber);border:1px solid rgba(255,179,0,0.2);}
.sub-badge.approved{background:rgba(129,199,132,0.1);color:var(--accent2);border:1px solid rgba(129,199,132,0.2);}
.sub-badge.rejected{background:rgba(239,83,80,0.1);color:var(--red);border:1px solid rgba(239,83,80,0.2);}
.sub-date{font-size:0.73rem;color:var(--muted);}
.sub-rejection{margin-top:7px;padding:8px 12px;background:rgba(239,83,80,0.06);border:1px solid rgba(239,83,80,0.15);border-radius:5px;font-size:0.78rem;color:#e07070;line-height:1.5;}
.sub-card-actions{flex-shrink:0;display:flex;flex-direction:column;align-items:stretch;gap:5px;padding:12px 14px;border-left:1px solid var(--border);justify-content:center;min-width:120px;}
.info-note{display:flex;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border);background:rgba(79,195,247,0.04);font-size:0.78rem;color:var(--muted);line-height:1.5;}
.info-note i{color:var(--accent);font-size:0.9rem;flex-shrink:0;margin-top:1px;}
.empty-state{padding:52px;text-align:center;color:var(--muted);font-size:0.88rem;}
.empty-state a{color:var(--accent);display:inline-flex;align-items:center;gap:7px;margin-top:12px;font-weight:600;}
.delete-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center;}
.delete-overlay.open{display:flex;}
.delete-box{background:#0d1016;border:1px solid var(--border2);border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,0.6);width:380px;max-width:90vw;overflow:hidden;}
.delete-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.delete-header i{color:var(--red);font-size:1rem;}
.delete-title{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;}
.delete-body{padding:16px 18px;font-size:0.85rem;color:var(--muted);line-height:1.5;}
.delete-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.btn-danger{background:rgba(239,83,80,0.12);border:1px solid rgba(239,83,80,0.3);border-radius:5px;color:var(--red);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:700;padding:8px 18px;cursor:pointer;transition:background .15s;}
.btn-danger:hover{background:rgba(239,83,80,0.22);}
.btn-cancel{background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;padding:8px 18px;cursor:pointer;transition:background .15s;}
.btn-cancel:hover{background:var(--surface2);color:var(--text);}
.toast-lcen{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(12px);background:rgba(13,16,24,0.95);border:1px solid var(--border2);color:var(--text);font-size:0.84rem;font-weight:500;padding:9px 20px;border-radius:6px;z-index:600;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;backdrop-filter:blur(8px);}
.toast-lcen.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-lcen.ok{border-color:rgba(129,199,132,0.4);color:var(--accent2);}
.toast-lcen.err{border-color:rgba(239,83,80,0.4);color:var(--red);}

/* ===== shared nav actions (search + user menu) ===== */
.nav-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-search-wrap{position:relative;}
.nav-search{display:flex;align-items:center;background:rgba(255,255,255,0.06);border-radius:999px;padding:7px 14px;gap:8px;border:1px solid var(--border);transition:border-color .15s,box-shadow .15s;}
.nav-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,195,247,0.12);}
.nav-search input{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text);outline:none;width:140px;}
.nav-search input::placeholder{color:var(--muted);}
.nav-search svg{color:var(--muted);flex-shrink:0;}
.nav-sr{position:absolute;top:calc(100% + 10px);left:0;width:280px;background:#13161e;border:1px solid var(--border2);border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,0.5);overflow:hidden;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .15s,transform .15s;z-index:200;max-height:360px;overflow-y:auto;}
.nav-sr.show{opacity:1;transform:translateY(0);pointer-events:all;}
.nav-sr-empty,.nav-sr-loading{padding:18px 16px;font-size:0.85rem;color:var(--muted);text-align:center;}
.nav-sr-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .12s;}
.nav-sr-item:hover{background:rgba(255,255,255,0.05);}
.nav-sr-item img{width:32px;height:32px;border-radius:6px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.nav-sr-name{font-size:0.88rem;font-weight:600;color:var(--text);}
.nav-sr-meta{font-size:0.74rem;color:var(--muted);}
.nav-sr-footer{padding:10px 14px;text-align:center;font-size:0.8rem;font-weight:600;color:var(--accent);border-top:1px solid var(--border);cursor:pointer;transition:background .12s;}
.nav-sr-footer:hover{background:rgba(255,255,255,0.04);}
.nav-uw{position:relative;}
.nav-ut{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid transparent;border-radius:999px;padding:4px 10px 4px 4px;cursor:pointer;transition:background .15s,border-color .15s;}
.nav-ut:hover{background:rgba(255,255,255,0.06);border-color:var(--border);}
.nav-ut img{width:30px;height:30px;border-radius:6px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.nav-ut .trig-n{font-size:0.85rem;font-weight:600;color:var(--text);max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-ut svg{color:var(--muted);transition:transform .15s;flex-shrink:0;}
.nav-uw.open .nav-ut svg{transform:rotate(180deg);}
.nav-um{position:absolute;top:calc(100% + 10px);right:0;width:220px;background:#13161e;border:1px solid var(--border2);border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,0.5);overflow:hidden;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .15s,transform .15s;z-index:200;}
.nav-uw.open .nav-um{opacity:1;transform:translateY(0);pointer-events:all;}
.nav-um-hdr{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--border);}
.nav-um-hdr img{width:38px;height:38px;border-radius:7px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.nav-um-name{font-size:0.92rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-um-sub{font-size:0.74rem;color:var(--gold);}
.nav-um-links{padding:6px;}
.nav-um-link{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:5px;font-size:0.86rem;font-weight:500;color:var(--text);transition:background .12s;}
.nav-um-link:hover{background:rgba(255,255,255,0.06);}
.nav-um-link svg{color:var(--muted);flex-shrink:0;}
.nav-um-div{height:1px;background:var(--border);margin:6px 0;}
.nav-um-link.danger{color:#ef5350;}
.nav-um-link.danger svg{color:#ef5350;}
.nav-gbtn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;padding:7px 16px;cursor:pointer;transition:color .15s,background .15s;}
.nav-gbtn:hover{color:var(--text);background:rgba(255,255,255,0.06);}
.nav-pbtn{background:var(--accent);border:none;border-radius:6px;color:#000;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:700;padding:7px 16px;cursor:pointer;transition:opacity .15s;}
.nav-pbtn:hover{opacity:0.85;}

</style>
</head>
<body>
<div class="panorama-wrap">
  <div class="panorama-track" id="panoramaTrack">
    <img src="/assets/images/panorama.png" alt="" class="panorama-img" id="panoImg1">
    <img src="/assets/images/panorama.png" alt="" class="panorama-img" id="panoImg2">
  </div>
  <div class="panorama-overlay"></div>
</div>
<div class="toast-lcen" id="lcenToast"></div>
<div class="delete-overlay" id="deleteOverlay">
  <div class="delete-box">
    <div class="delete-header">
      <i class="fa-solid fa-triangle-exclamation"></i>
      <span class="delete-title">Delete Plugin?</span>
    </div>
    <div class="delete-body" id="deleteDesc"></div>
    <div class="delete-footer">
      <button class="btn-cancel" id="deleteCancel">Cancel</button>
      <button class="btn-danger" id="deleteConfirm">Delete</button>
    </div>
  </div>
</div>
<nav>
  <a href="/" class="nav-logo">
    <img src="/assets/logo.png" alt="LCEN">
    <span class="nav-logo-text">LCE Network</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link"><i style="margin-right:7px;" class="fa-solid fa-arrow-up-right-from-square"></i>Home</a>
    <a href="/dashboard/" class="nav-link">Dashboard</a>
    <a href="/messages/" class="nav-link">Messages</a>
    <a href="/profile/" class="nav-link">Profile</a>
    <a href="/friends/" class="nav-link">Friends</a>
    <a href="/plugin/" class="nav-link active">Plugins</a>
    <a href="/servers/" class="nav-link">Servers</a>
    <a href="/leaderboards/" class="nav-link">Leaderboards</a>
  </div>
  <div class="nav-actions" id="_nav_actions"></div>
</nav>
<div class="page">
  <div class="wrap">
    <div class="page-header">
      <div>
        <div class="page-title">My Plugins</div>
        <div class="page-subtitle">Manage your published plugins and review submission status</div>
      </div>
      <div class="header-actions">
        <a href="/plugin/create/" class="btn-primary">
          <i class="fa-solid fa-plus"></i>Submit Plugin
        </a>
      </div>
    </div>
    <div class="stats-strip">
      <div class="stat-tile">
        <div class="stat-icon pub"><i class="fa-solid fa-puzzle-piece"></i></div>
        <div><div class="stat-val" id="svPublished">—</div><div class="stat-lbl">Published</div></div>
      </div>
      <div class="stat-tile">
        <div class="stat-icon dl"><i class="fa-solid fa-download"></i></div>
        <div><div class="stat-val" id="svDownloads">—</div><div class="stat-lbl">Total Downloads</div></div>
      </div>
      <div class="stat-tile">
        <div class="stat-icon lk"><i class="fa-solid fa-heart"></i></div>
        <div><div class="stat-val" id="svLikes">—</div><div class="stat-lbl">Total Likes</div></div>
      </div>
    </div>
    <div class="panel">
      <div class="tab-bar">
        <div class="tab-item active" data-tab="plugins" id="tabPlugins">
          <i class="fa-solid fa-cube" style="font-size:.8rem"></i>
          Published
          <span class="tab-count" id="tabPluginsCount">—</span>
        </div>
        <div class="tab-item" data-tab="submissions" id="tabSubmissions">
          <i class="fa-solid fa-clock-rotate-left" style="font-size:.8rem"></i>
          Submissions
          <span class="tab-count" id="tabSubsCount">—</span>
        </div>
      </div>
      <div id="tabContent"></div>
    </div>
  </div>
</div>
<script>
const API = "https://network-server-7kuc.onrender.com";
function token()   { return localStorage.getItem("lcen_token"); }
function profile() { try { return JSON.parse(localStorage.getItem("lcen_profile")); } catch { return null; } }
function avatarUrl(xuid) { return `${API}/avatar/${xuid}`; }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmtDate(ts) { if(!ts) return "—"; return new Date(ts).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); }
function numFmt(n) { return Number(n||0).toLocaleString(); }

function showToast(msg, type) {
  const t = document.getElementById("lcenToast");
  t.textContent = msg;
  t.className = "toast-lcen show" + (type === "error" ? " err" : type === "success" ? " ok" : "");
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.classList.remove("show","ok","err"); }, 3200);
}

let _delCb = null;
function askDelete(name, cb) {
  _delCb = cb;
  document.getElementById("deleteDesc").textContent = `"${name}" will be permanently removed. This cannot be undone.`;
  document.getElementById("deleteOverlay").classList.add("open");
}
document.getElementById("deleteConfirm").addEventListener("click", () => {
  const cb = _delCb; _delCb = null;
  document.getElementById("deleteOverlay").classList.remove("open");
  if (cb) cb();
});
document.getElementById("deleteCancel").addEventListener("click", () => {
  document.getElementById("deleteOverlay").classList.remove("open"); _delCb = null;
});
document.getElementById("deleteOverlay").addEventListener("click", e => {
  if (e.target.id === "deleteOverlay") { document.getElementById("deleteOverlay").classList.remove("open"); _delCb = null; }
});

let currentTab = new URLSearchParams(location.search).get("tab") || "plugins";

function setActiveTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-item").forEach(t => t.classList.toggle("active", t.dataset.tab === tab));
  if (tab === "plugins") renderPlugins();
  else renderSubmissions();
}

document.querySelectorAll(".tab-item").forEach(t => {
  t.addEventListener("click", () => setActiveTab(t.dataset.tab));
});

async function renderPlugins() {
  const content = document.getElementById("tabContent");
  const p = profile();
  content.innerHTML = `<div class="empty-state">Loading…</div>`;
  try {
    const res = await fetch(`${API}/plugins`, {
      headers: { Authorization: `Bearer ${token()}` }
    });
    if (!res.ok) throw new Error();
    const all = await res.json();
    const addons = all.filter(a => a.ownerXuid === p.xuid);

    document.getElementById("svPublished").textContent = numFmt(addons.length);
    document.getElementById("svDownloads").textContent = numFmt(addons.reduce((s,a) => s + (a.downloads||0), 0));
    document.getElementById("svLikes").textContent     = numFmt(addons.reduce((s,a) => s + (a.likes||0), 0));
    document.getElementById("tabPluginsCount").textContent = addons.length;

    if (!addons.length) {
      content.innerHTML = `<div class="empty-state">No published plugins yet.<a href="/plugin/create/"><i class="fa-solid fa-plus"></i> Submit your first plugin</a></div>`;
      return;
    }

    content.innerHTML = "";
    addons.forEach(a => {
      const id = a._id;
      const accentCls = a.visibility === "private" ? "vis-private" : a.visibility === "unlisted" ? "vis-unlisted" : "";
      const row = document.createElement("div");
      row.className = "plugin-row";
      row.innerHTML = `
        <div class="row-accent ${accentCls}"></div>
        <div class="plugin-icon"><img src="${API}/plugins/${id}/icon" alt="" onerror="this.src='${API}/avatar/default'"></div>
        <div class="plugin-info">
          <div class="plugin-name">${esc(a.name)}</div>
          ${a.short_description ? `<div class="plugin-desc">${esc(a.short_description)}</div>` : ""}
          <div class="plugin-meta">
            <span class="meta-date">${fmtDate(a.created_at)}</span>
            ${a.category ? `<span class="meta-badge badge-cat">${esc(a.category)}</span>` : ""}
            ${a.visibility === "unlisted" ? `<span class="meta-badge badge-unlisted">Unlisted</span>` : ""}
            ${a.visibility === "private"  ? `<span class="meta-badge badge-private">Private</span>` : ""}
          </div>
        </div>
        <div class="plugin-stats">
          <div class="pstat"><div class="pstat-val">${numFmt(a.downloads||0)}</div><div class="pstat-lbl">Downloads</div></div>
          <div class="pstat-sep"></div>
          <div class="pstat"><div class="pstat-val">${numFmt(a.likes||0)}</div><div class="pstat-lbl">Likes</div></div>
        </div>
        <div class="row-actions">
          <a href="/plugin/view/?id=${id}" class="row-btn">View</a>
          <a href="/plugin/update/?id=${id}" class="row-btn accent">Edit</a>
          <button class="row-btn danger js-del">Delete</button>
        </div>`;
      row.querySelector(".js-del").addEventListener("click", e => {
        e.stopPropagation();
        askDelete(a.name, async () => {
          const r = await fetch(`${API}/plugins/${id}`, { method:"DELETE", headers:{ Authorization:`Bearer ${token()}` } });
          if (r.ok || r.status === 204) { showToast("Deleted", "success"); renderPlugins(); }
          else showToast("Delete failed", "error");
        });
      });
      row.addEventListener("click", e => {
        if (!e.target.closest("button") && !e.target.closest("a")) location.href = `/plugin/view/?id=${id}`;
      });
      content.appendChild(row);
    });

    const addRow = document.createElement("a");
    addRow.href = "/plugin/create/";
    addRow.className = "new-plugin-row";
    addRow.innerHTML = `<i class="fa-solid fa-plus" style="font-size:.8rem"></i> Submit another plugin`;
    content.appendChild(addRow);

  } catch {
    content.innerHTML = `<div class="empty-state">Failed to load plugins.</div>`;
  }
}

async function renderSubmissions() {
  const content = document.getElementById("tabContent");
  content.innerHTML = `<div class="empty-state">Loading…</div>`;
  try {
    const res = await fetch(`${API}/plugins/submissions/mine`, {
      headers: { Authorization: `Bearer ${token()}` }
    });
    if (!res.ok) throw new Error();
    const subs = await res.json();
    document.getElementById("tabSubsCount").textContent = subs.length;

    if (!subs.length) {
      content.innerHTML = `
        <div class="info-note"><i class="fa-solid fa-circle-info"></i>When you submit a plugin, admins review the .dll file and source code. Approved plugins appear in the Plugin Library.</div>
        <div class="empty-state">No submissions yet.</div>`;
      return;
    }

    content.innerHTML = `
      <div class="info-note"><i class="fa-solid fa-circle-info"></i>Admins review each .dll and GitHub source. Approved plugins go live in the Plugin Library.</div>
      <div id="subList"></div>`;

    const list = document.getElementById("subList");
    subs.forEach(s => {
      const id = s._id;
      const statusCls = s.status === "approved" ? "approved" : s.status === "rejected" ? "rejected" : "pending";
      const card = document.createElement("div");
      card.className = "sub-card";
      card.innerHTML = `
        <div class="sub-card-main">
          <div class="sub-name">${esc(s.name || "Untitled")}</div>
          <div class="sub-meta">
            <span class="sub-badge ${statusCls}">${s.status || "pending"}</span>
            <span class="sub-date">${fmtDate(s.submitted_at)}</span>
            ${s.category ? `<span class="meta-badge badge-cat">${esc(s.category)}</span>` : ""}
          </div>
          ${s.status === "rejected" && s.rejection_reason ? `<div class="sub-rejection"><i class="fa-solid fa-circle-xmark" style="margin-right:5px"></i>${esc(s.rejection_reason)}</div>` : ""}
        </div>
        <div class="sub-card-actions">
          ${s.status === "rejected" ? `<a href="/plugin/create/" class="row-btn accent">Resubmit</a>` : ""}
          <button class="row-btn danger js-del-sub">Delete</button>
        </div>`;
      card.querySelector(".js-del-sub").addEventListener("click", () => {
        askDelete(s.name || "this submission", async () => {
          showToast("Submissions cannot be deleted from here — contact an admin.", "error");
        });
      });
      list.appendChild(card);
    });
  } catch {
    content.innerHTML = `<div class="empty-state">Failed to load submissions.</div>`;
  }
}

(async () => {
  const p = profile();
  if (!p || !token()) { location.href = "/login/"; return; }
  setActiveTab(currentTab);
})();

(() => {
  const img1  = document.getElementById("panoImg1");
  const track = document.getElementById("panoramaTrack");
  function onLoad() {
    const displayH = window.innerHeight;
    const displayW = Math.ceil(img1.naturalWidth * (displayH / img1.naturalHeight));
    img1.style.width = displayW + "px"; img1.style.minWidth = "unset";
    document.getElementById("panoImg2").style.width = displayW + "px";
    document.getElementById("panoImg2").style.minWidth = "unset";
    const style = document.createElement("style");
    style.textContent = `@keyframes pan{0%{transform:translateX(0);}100%{transform:translateX(-${displayW}px);}}`;
    document.head.appendChild(style);
    track.style.animation = `pan ${displayW / 40}s linear infinite`;
  }
  img1.complete ? onLoad() : img1.addEventListener("load", onLoad);
})();
</script>
<script>
/* ===== shared LCEN nav ===== */
(function(){
const API="https://network-server-7kuc.onrender.com";
function tok(){return localStorage.getItem("lcen_token");}
function prof(){try{return JSON.parse(localStorage.getItem("lcen_profile"));}catch{return null;}}
function avUrl(xuid){return API+"/avatar/"+xuid;}

let _sd=null,_sa=null;

function buildSearch(el){
  const wrap=document.createElement("div");
  wrap.className="nav-search-wrap";
  wrap.innerHTML='<div class="nav-search"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input type="text" placeholder="Search players..." id="_nsi" autocomplete="off"></div><div class="nav-sr" id="_nsr"></div>';
  el.appendChild(wrap);
  const inp=wrap.querySelector("#_nsi"),res=wrap.querySelector("#_nsr");
  inp.addEventListener("input",e=>{
    const q=e.target.value.trim();
    clearTimeout(_sd);
    if(!q){res.classList.remove("show");res.innerHTML="";return;}
    _sd=setTimeout(()=>doSearch(q,res),250);
  });
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"){const q=inp.value.trim();if(q)location.href="/profile/?q="+encodeURIComponent(q);}
    if(e.key==="Escape"){res.classList.remove("show");inp.blur();}
  });
  inp.addEventListener("focus",()=>{if(res.innerHTML.trim())res.classList.add("show");});
  document.addEventListener("click",e=>{if(!wrap.contains(e.target))res.classList.remove("show");});
}

async function doSearch(q,res){
  res.innerHTML='<div class="nav-sr-loading">Searching...</div>';
  res.classList.add("show");
  if(_sa)_sa.abort();
  _sa=new AbortController();
  try{
    let players=[];
    try{
      const d=await fetch(API+"/players/search?q="+encodeURIComponent(q)+"&scope=all",{signal:_sa.signal,headers:tok()?{Authorization:"Bearer "+tok()}:{}}).then(r=>r.json());
      players=Array.isArray(d)?d:d.results||[];
    }catch{players=[];}
    if(!players.length){
      res.innerHTML='<div class="nav-sr-empty">No players found for "'+q+'".</div><div class="nav-sr-footer" id="_nsall">View full search</div>';
    }else{
      res.innerHTML=players.slice(0,6).map(p=>'<div class="nav-sr-item" data-gt="'+p.gamertag+'"><img src="'+avUrl(p.xuid)+'" onerror="this.style.visibility=\'hidden\'"><div><div class="nav-sr-name">'+p.gamertag+'</div><div class="nav-sr-meta">'+(p.gamerscore||0)+' G</div></div></div>').join('')+'<div class="nav-sr-footer" id="_nsall">View full search</div>';
      res.querySelectorAll(".nav-sr-item").forEach(it=>it.addEventListener("click",()=>location.href="/profile/?q="+encodeURIComponent(it.dataset.gt)));
    }
    const va=res.querySelector("#_nsall");
    if(va)va.addEventListener("click",()=>location.href="/profile/?q="+encodeURIComponent(q));
  }catch(e){if(e.name==="AbortError")return;res.innerHTML='<div class="nav-sr-empty">No results.</div>';}
}

function buildUserMenu(el,p){
  const av=avUrl(p.xuid);
  const wrap=document.createElement("div");
  wrap.className="nav-uw";
  wrap.innerHTML='<button class="nav-ut"><img src="'+av+'" onerror="this.style.visibility=\'hidden\'"><span class="trig-n">'+p.gamertag+'</span><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button><div class="nav-um"><div class="nav-um-hdr"><img src="'+av+'" onerror="this.style.visibility=\'hidden\'"><div><div class="nav-um-name">'+p.gamertag+'</div><div class="nav-um-sub">'+(p.gamerscore||0)+' G</div></div></div><div class="nav-um-links"><a href="/profile/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</a><a href="/dashboard/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Dashboard</a><a href="/friends/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Friends</a><a href="/messages/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Messages</a><a href="/plugin/manage" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>Manage Plugins</a><div class="nav-um-div"></div><a href="#" class="nav-um-link danger" id="_nsout"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>Sign Out</a></div></div>';
  wrap.querySelector(".nav-ut").addEventListener("click",e=>{e.stopPropagation();wrap.classList.toggle("open");});
  document.addEventListener("click",e=>{if(!wrap.contains(e.target))wrap.classList.remove("open");});
  wrap.querySelector("#_nsout").addEventListener("click",e=>{e.preventDefault();localStorage.removeItem("lcen_token");localStorage.removeItem("lcen_profile");location.href="/";});
  el.appendChild(wrap);
}

function buildNav(){
  const el=document.getElementById("_nav_actions");
  if(!el)return;
  el.innerHTML="";
  buildSearch(el);
  const p=prof();
  if(p){
    buildUserMenu(el,p);
  }else{
    const si=document.createElement("button");si.className="nav-gbtn";si.textContent="Sign In";si.onclick=()=>location.href="/login/";
    const rg=document.createElement("button");rg.className="nav-pbtn";rg.textContent="Register";rg.onclick=()=>location.href="/register/";
    el.appendChild(si);el.appendChild(rg);
  }
}

if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",buildNav);
else buildNav();
})();

</script>
