<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboards | LCE Network</title>
<link rel="icon" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0c10;
  --surface: rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text:    #e8eaf0;
  --muted:   #7a8090;
  --accent:  #4fc3f7;
  --accent2: #81c784;
  --gold:    #ffd54f;
  --red:     #ef5350;
  --nav-h:   56px;

  --lb-row-player: rgba(79,195,247,0.08);
  --lb-row-hover:  rgba(255,255,255,0.04);
  --lb-row-1: rgba(255,213,79,0.07);
  --lb-row-2: rgba(192,192,192,0.05);
  --lb-row-3: rgba(205,127,50,0.05);
  --rank-1: #ffd54f;
  --rank-2: #b0bec5;
  --rank-3: #ce9a6a;
}

html, body { min-height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }

.panorama-wrap {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}
.panorama-track {
  display: flex; height: 100%;
  animation: panBg 80s linear infinite;
  will-change: transform;
}
.panorama-img {
  height: 100%; width: auto; min-width: 100vw; object-fit: cover; flex-shrink: 0;
  filter: blur(3px) brightness(0.38) saturate(0.7); transform: scale(1.04);
}
@keyframes panBg { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.panorama-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(10,12,16,0.3) 0%, rgba(10,12,16,0.1) 40%, rgba(10,12,16,0.55) 100%);
}

nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(10,12,16,0.85);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px; gap: 32px; z-index: 100;
}
.nav-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.nav-logo img { width: 28px; height: 28px; object-fit: contain; }
.nav-logo-text {
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 1.15rem; letter-spacing: 0.04em;
}
.nav-links { display: flex; gap: 4px; flex: 1; }
.nav-link {
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
  letter-spacing: 0.06em; color: var(--muted);
  padding: 6px 14px; border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--accent); }
.nav-user { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.nav-avatar {
  width: 32px; height: 32px; border-radius: 4px;
  background: var(--surface); border: 1px solid var(--border2);
  overflow: hidden; flex-shrink: 0;
}
.nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
.nav-gamertag { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.04em; }
.nav-gs { font-size: 0.78rem; color: var(--gold); font-weight: 500; }

.page {
  position: relative; z-index: 1;
  padding-top: calc(var(--nav-h) + 32px);
  padding-bottom: 80px; min-height: 100vh;
}

.lb-wrap {
  max-width: 1020px; margin: 0 auto; padding: 0 24px;
  display: flex; flex-direction: column; gap: 16px;
  animation: fadeUp 0.4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.panel {
  background: rgba(10,12,16,0.72);
  border: 1px solid var(--border);
  border-radius: 8px;
  backdrop-filter: blur(12px);
  overflow: hidden;
}

.lb-controls {
  display: flex; flex-direction: column; gap: 10px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}

.lb-controls-row {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}

.lb-controls-row.split {
  justify-content: space-between;
}

.control-label {
  font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted); white-space: nowrap;
}

.seg-group {
  display: flex; gap: 2px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 5px; padding: 2px;
}

.seg-btn {
  border: none; background: transparent;
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem; font-weight: 500;
  padding: 5px 14px; border-radius: 3px; cursor: pointer;
  transition: background 0.12s, color 0.12s; white-space: nowrap;
}

.seg-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }

.seg-btn.active {
  background: rgba(79,195,247,0.15);
  color: var(--accent);
  font-weight: 600;
}

.lb-header-panel {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}

.lb-title-group { display: flex; flex-direction: column; gap: 3px; }

.lb-title {
  font-family: 'Rajdhani', sans-serif; font-size: 1.45rem;
  font-weight: 700; letter-spacing: 0.02em; line-height: 1.1;
}

.lb-subtitle {
  font-size: 0.76rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em;
}

.lb-entries-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 10px;
}

.lb-table { width: 100%; border-collapse: collapse; }

.lb-table thead tr {
  border-bottom: 1px solid var(--border);
}

.lb-table th {
  padding: 10px 14px;
  font-size: 0.72rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); text-align: left;
  white-space: nowrap;
}

.lb-table th.col-rank  { width: 64px; text-align: center; }
.lb-table th.col-name  { min-width: 140px; }
.lb-table th.col-stat  { width: 100px; text-align: right; }
.lb-table th.col-total { width: 110px; text-align: right; color: var(--gold); }

.lb-table th.col-icon {
  width: 100px; text-align: center; padding: 8px 6px;
}

.col-icon-img {
  width: 28px; height: 28px;
  image-rendering: pixelated;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,0.05);
  padding: 3px;
  display: inline-block;
  vertical-align: middle;
}

.lb-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
  cursor: default;
}

.lb-table tbody tr:last-child { border-bottom: none; }
.lb-table tbody tr:hover { background: var(--lb-row-hover); }

.lb-table tbody tr.rank-1 { background: var(--lb-row-1); }
.lb-table tbody tr.rank-2 { background: var(--lb-row-2); }
.lb-table tbody tr.rank-3 { background: var(--lb-row-3); }
.lb-table tbody tr.is-player { background: var(--lb-row-player) !important; }

.lb-table td { padding: 11px 14px; font-size: 0.88rem; vertical-align: middle; }

.td-rank {
  text-align: center; font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem; font-weight: 700; width: 64px;
}

.rank-medal {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 700;
}

.rank-medal.m1 { background: rgba(255,213,79,0.15); color: var(--rank-1); border: 1px solid rgba(255,213,79,0.3); }
.rank-medal.m2 { background: rgba(176,190,197,0.12); color: var(--rank-2); border: 1px solid rgba(176,190,197,0.25); }
.rank-medal.m3 { background: rgba(206,154,106,0.12); color: var(--rank-3); border: 1px solid rgba(206,154,106,0.25); }

.td-name { display: flex; align-items: center; gap: 9px; }

.td-name-avatar {
  width: 26px; height: 26px; border-radius: 3px;
  background: var(--surface2); border: 1px solid var(--border);
  object-fit: cover; flex-shrink: 0;
}

.td-name-tag {
  font-family: 'DM Sans', sans-serif; font-weight: 600;
  font-size: 0.88rem; letter-spacing: 0.01em;
}

.td-name-tag.is-player { color: var(--accent); }

.player-badge {
  font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--accent);
  background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.25);
  border-radius: 3px; padding: 1px 5px; flex-shrink: 0;
}

.td-stat {
  text-align: right; font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.92rem; font-weight: 600; color: #c8ccd6;
  letter-spacing: 0.02em;
}

.td-total {
  text-align: right; font-family: 'Rajdhani', sans-serif;
  font-size: 1.05rem; font-weight: 700; color: var(--gold);
}

.td-stat.dist, .td-total.dist { color: #a5d6a7; }

.empty-state {
  padding: 48px 20px; text-align: center;
  color: var(--muted); font-size: 0.84rem;
}

.spinner-wrap { padding: 48px; text-align: center; }
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast-lcen {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(13,16,24,0.95); border: 1px solid var(--border2);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.84rem; font-weight: 500; padding: 9px 20px;
  border-radius: 6px; z-index: 500; opacity: 0;
  transition: opacity 0.2s, transform 0.2s; pointer-events: none;
  backdrop-filter: blur(8px);
}
.toast-lcen.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 700px) {
  .lb-controls { gap: 8px; }
  .seg-btn { padding: 5px 9px; font-size: 0.76rem; }
  .lb-table th.col-stat, .lb-table td:not(.td-rank-cell):not(.td-name-cell):not(.td-total-cell) {
    display: none;
  }
}
</style>
</head>
<body>

<div class="panorama-wrap">
  <div class="panorama-track" id="panoramaTrack">
    <img src="/assets/images/panorama.png" alt="" class="panorama-img" id="panoImg1">
    <img src="/assets/images/panorama.png" alt="" class="panorama-img" id="panoImg2">
  </div>
  <div class="panorama-overlay"></div>
</div>

<div class="toast-lcen" id="lcenToast"></div>

<nav>
  <a href="/" class="nav-logo">
    <img src="/assets/logo.png" alt="LCEN">
    <span class="nav-logo-text">LCE Network</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link"><i style="margin-right:7px;" class="fa-solid fa-arrow-up-right-from-square"></i>Home</a>
    <a href="/download/" class="nav-link"><i style="margin-right:7px;" class="fa-solid fa-arrow-up-right-from-square"></i>Download</a>
    <a href="/dashboard/" class="nav-link">Dashboard</a>
    <a href="/messages/" class="nav-link">Messages</a>
    <a href="/profile/" class="nav-link">My Profile</a>
    <a href="/friends/" class="nav-link">My Friends</a>
    <a href="/leaderboards/" class="nav-link active">Leaderboards</a>
  </div>
  <div class="nav-user" id="navUser" style="display:none">
    <div class="nav-avatar">
      <img id="navAvatarImg" src="" alt="">
    </div>
    <div>
      <div class="nav-gamertag" id="navGamertag"></div>
      <div class="nav-gs" id="navGs"></div>
    </div>
  </div>
</nav>

<div class="page">
  <div class="lb-wrap">

    <div class="panel">
      <div class="lb-controls">

        <div class="lb-controls-row split">
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="control-label">Board</span>
            <div class="seg-group" id="typeGroup">
              <button class="seg-btn active" data-type="0">Travelling</button>
              <button class="seg-btn" data-type="1">Mining</button>
              <button class="seg-btn" data-type="2">Farming</button>
              <button class="seg-btn" data-type="3">Kills</button>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="control-label">Filter</span>
            <div class="seg-group" id="filterGroup">
              <button class="seg-btn active" data-filter="top"><i class="fa-solid fa-trophy" style="margin-right:5px;font-size:0.7rem;"></i>Overall</button>
              <button class="seg-btn" data-filter="friends"><i class="fa-solid fa-user-group" style="margin-right:5px;font-size:0.7rem;"></i>Friends</button>
              <button class="seg-btn" data-filter="me"><i class="fa-solid fa-crosshairs" style="margin-right:5px;font-size:0.7rem;"></i>My Score</button>
            </div>
          </div>
        </div>

        <div class="lb-controls-row">
          <span class="control-label">Difficulty</span>
          <div class="seg-group" id="diffGroup">
            <button class="seg-btn" data-diff="0">Peaceful</button>
            <button class="seg-btn" data-diff="1">Easy</button>
            <button class="seg-btn active" data-diff="2">Normal</button>
            <button class="seg-btn" data-diff="3">Hard</button>
          </div>
        </div>

      </div>
    </div>

    <div class="panel" id="tablePanel">
      <div class="spinner-wrap"><div class="spinner"></div></div>
    </div>

  </div>
</div>

<script src="/assets/app.js"></script>
<script>
  window.LCEN.initLeaderboards();
</script>
</body>
</html>
