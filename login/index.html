<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCE Network | Sign In</title>
<link rel="stylesheet" href="/assets/style.css">
<link rel="icon" href="/assets/logo.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
</head>
<body>
<div class="bg-blur-layer"></div>
<nav>
  <a href="/" class="nav-logo">
    <img src="/assets/logo.png" alt="LCEN">
    <span class="nav-logo-text">LCE Network</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/download/" class="nav-link">Download</a>
    <a href="/plugin/" class="nav-link">Plugins</a>
    <a href="/servers/" class="nav-link">Servers</a>
    <a href="/leaderboards/" class="nav-link">Leaderboards</a>
    <a href="/dashboard/" class="nav-link"><i style="margin-right: 7px;" class="fa-solid fa-arrow-up-right-from-square"></i>Dashboard</a>
  </div>
  <div class="nav-actions"></div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <img src="/assets/logo.png" alt="LCEN">
        <span class="auth-logo-text">LCE Network</span>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your LCEN account</p>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
      </div>
      <div class="form-error" id="login-error"></div>
      <button type="submit" class="btn btn-primary form-submit">Sign In</button>
    </form>

    <div class="auth-switch">
      Don't have an account? <a href="/register/">Register</a>
    </div>
  </div>
</div>

<script src="/assets/app.js"></script>
<script>
  LCEN.initLogin();
  LCEN.buildNav();
</script>
</body>
</html>
