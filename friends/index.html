<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCE Network | Friends</title>
<link rel="icon" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0c10;
  --surface: rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text:    #e8eaf0;
  --muted:   #7a8090;
  --accent:  #4fc3f7;
  --accent2: #81c784;
  --gold:    #ffd54f;
  --red:     #ef5350;
  --nav-h:   56px;
}

html, body { min-height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }

.panorama-wrap {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
}

.panorama-track {
  display: flex;
  height: 100%;
  animation: panBg 80s linear infinite;
  will-change: transform;
}

.panorama-img {
  height: 100%;
  width: auto;
  min-width: 100vw;
  object-fit: cover;
  flex-shrink: 0;
  filter: blur(3px) brightness(0.38) saturate(0.7);
  transform: scale(1.04);
}

@keyframes panBg {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.panorama-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, rgba(10,12,16,0.3) 0%, rgba(10,12,16,0.1) 40%, rgba(10,12,16,0.55) 100%);
}

nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(10,12,16,0.85);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 32px;
  z-index: 100;
}

.nav-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.nav-logo img { width: 28px; height: 28px; object-fit: contain; }
.nav-logo-text {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: 1.15rem;
  letter-spacing: 0.04em;
}

.nav-links { display: flex; gap: 4px; flex: 1; }

.nav-link {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--muted);
  padding: 6px 14px;
  border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}

.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--accent); }

.nav-user { display: flex; align-items: center; gap: 10px; cursor: pointer; }

.nav-avatar {
  width: 32px; height: 32px;
  border-radius: 4px;
  background: var(--surface);
  border: 1px solid var(--border2);
  overflow: hidden;
  flex-shrink: 0;
}

.nav-avatar img { width: 100%; height: 100%; object-fit: cover; }
.nav-gamertag { font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.04em; }
.nav-gs { font-size: 0.78rem; color: var(--gold); font-weight: 500; }

.page {
  position: relative;
  z-index: 1;
  padding-top: calc(var(--nav-h) + 32px);
  padding-bottom: 80px;
  min-height: 100vh;
}

.friends-wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  animation: fadeUp 0.4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.page-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.panel {
  background: rgba(10,12,16,0.72);
  border: 1px solid var(--border);
  border-radius: 8px;
  backdrop-filter: blur(12px);
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.tabs-bar {
  display: flex;
  gap: 2px;
  padding: 4px;
  background: rgba(10,12,16,0.72);
  border: 1px solid var(--border);
  border-radius: 8px;
  backdrop-filter: blur(12px);
  width: fit-content;
}

.f-tab {
  padding: 7px 18px;
  border-radius: 5px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.84rem;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted);
  transition: color 0.15s, background 0.15s;
  display: flex;
  align-items: center;
  gap: 7px;
}

.f-tab:hover { color: var(--text); background: var(--surface2); }

.f-tab.active { background: rgba(79,195,247,0.12); color: var(--accent); border: 1px solid rgba(79,195,247,0.18); }

.tab-badge {
  font-size: 0.68rem;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--border2);
  color: var(--muted);
  min-width: 18px;
  text-align: center;
}

.f-tab.active .tab-badge { background: rgba(79,195,247,0.2); color: var(--accent); }
.tab-badge.alert { background: rgba(239,83,80,0.2); color: var(--red); }

.f-panel { display: none; }
.f-panel.active { display: block; }

.friends-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1px;
  background: var(--border);
}

.friend-card {
  background: rgba(10,12,16,0.72);
  padding: 14px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: background 0.12s;
}

.friend-card:hover { background: rgba(255,255,255,0.03); }

.friend-card-avatar {
  width: 40px; height: 40px;
  border-radius: 5px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--surface2);
}

.friend-card-info { flex: 1; min-width: 0; }

.friend-card-gamertag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.94rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text);
}

.friend-card-gamertag:hover { color: var(--accent); }

.friend-card-gs {
  font-size: 0.73rem;
  color: var(--muted);
  margin-top: 1px;
}

.btn-remove {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  border-radius: 4px;
  padding: 4px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.74rem;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}

.btn-remove:hover { border-color: rgba(239,83,80,0.4); color: var(--red); background: rgba(239,83,80,0.06); }

.list-header {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.73rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  padding: 12px 20px 8px;
  border-bottom: 1px solid var(--border);
}

.req-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}

.req-item:last-child { border-bottom: none; }
.req-item:hover { background: rgba(255,255,255,0.02); }

.req-avatar {
  width: 38px; height: 38px;
  border-radius: 5px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--surface2);
}

.req-info { flex: 1; min-width: 0; }

.req-gamertag {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.req-sub { font-size: 0.73rem; color: var(--muted); margin-top: 1px; }

.req-actions { display: flex; gap: 6px; flex-shrink: 0; }

.btn-accept {
  background: rgba(129,199,132,0.14);
  color: var(--accent2);
  border: 1px solid rgba(129,199,132,0.24);
  border-radius: 4px;
  padding: 6px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-accept:hover { opacity: 0.82; }

.btn-decline {
  background: rgba(239,83,80,0.1);
  color: var(--red);
  border: 1px solid rgba(239,83,80,0.2);
  border-radius: 4px;
  padding: 6px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.btn-decline:hover { opacity: 0.82; }

.pending-chip {
  font-size: 0.7rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 10px;
  background: rgba(255,213,79,0.1);
  color: var(--gold);
  border: 1px solid rgba(255,213,79,0.2);
  flex-shrink: 0;
}

.search-wrap { padding: 14px 18px; border-bottom: 1px solid var(--border); }

.search-input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 8px 12px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.86rem;
  outline: none;
  transition: border-color 0.15s;
}

.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--border2); }

.search-results { }

.search-result-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 18px;
  border-bottom: 1px solid var(--border);
  transition: background 0.12s;
}

.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: rgba(255,255,255,0.02); }

.search-result-avatar {
  width: 36px; height: 36px;
  border-radius: 4px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--surface2);
}

.search-result-info { flex: 1; min-width: 0; }

.search-result-gt {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text);
}

.search-result-gs { font-size: 0.73rem; color: var(--muted); margin-top: 1px; }

.btn-friend-add {
  background: rgba(79,195,247,0.12);
  color: var(--accent);
  border: 1px solid rgba(79,195,247,0.22);
  border-radius: 4px;
  padding: 6px 13px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity 0.15s;
  white-space: nowrap;
}

.btn-friend-add:hover:not(:disabled) { opacity: 0.82; }

.btn-friend-add.state-pending {
  background: var(--surface);
  color: var(--muted);
  border-color: var(--border);
  opacity: 0.55;
  cursor: not-allowed;
  pointer-events: none;
}

.btn-friend-add.state-friends {
  background: rgba(129,199,132,0.1);
  color: var(--accent2);
  border-color: rgba(129,199,132,0.2);
  cursor: default;
  pointer-events: none;
}

.empty-state {
  padding: 44px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 0.84rem;
}

.empty-state svg { opacity: 0.28; margin: 0 auto 12px; display: block; }
.empty-state strong { display: block; font-size: 0.94rem; color: var(--text); margin-bottom: 4px; font-weight: 600; }

.spinner-inline {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin: 28px auto;
}

@keyframes spin { to { transform: rotate(360deg); } }

.toast-f {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(13,16,24,0.95);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.84rem;
  font-weight: 500;
  padding: 9px 20px;
  border-radius: 6px;
  z-index: 500;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  backdrop-filter: blur(8px);
}

.toast-f.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.confirm-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(10,12,16,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s;
}

.confirm-backdrop.visible { opacity: 1; pointer-events: all; }

.confirm-box {
  background: rgba(13,16,23,0.96);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 26px 26px 20px;
  max-width: 340px;
  width: 100%;
  backdrop-filter: blur(12px);
  transform: translateY(10px) scale(0.98);
  opacity: 0;
  transition: transform 0.18s, opacity 0.18s;
}

.confirm-backdrop.visible .confirm-box { transform: translateY(0) scale(1); opacity: 1; }

.confirm-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 0.96rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.confirm-body {
  font-size: 0.84rem;
  color: var(--muted);
  line-height: 1.55;
  margin-bottom: 20px;
}

.confirm-body strong { color: var(--text); font-weight: 600; }

.confirm-actions { display: flex; justify-content: flex-end; gap: 8px; }

.confirm-cancel {
  background: none;
  border: 1px solid var(--border2);
  color: var(--muted);
  border-radius: 4px;
  padding: 7px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.confirm-cancel:hover { color: var(--text); border-color: var(--border2); }

.confirm-confirm {
  background: rgba(239,83,80,0.15);
  color: var(--red);
  border: 1px solid rgba(239,83,80,0.25);
  border-radius: 4px;
  padding: 7px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}

.confirm-confirm:hover { opacity: 0.82; }
.confirm-confirm:disabled { opacity: 0.45; cursor: not-allowed; }

/* ===== shared nav actions (search + user menu) ===== */
.nav-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-search-wrap{position:relative;}
.nav-search{display:flex;align-items:center;background:rgba(255,255,255,0.06);border-radius:999px;padding:7px 14px;gap:8px;border:1px solid var(--border);transition:border-color .15s,box-shadow .15s;}
.nav-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,195,247,0.12);}
.nav-search input{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text);outline:none;width:140px;}
.nav-search input::placeholder{color:var(--muted);}
.nav-search svg{color:var(--muted);flex-shrink:0;}
.nav-sr{position:absolute;top:calc(100% + 10px);left:0;width:280px;background:#13161e;border:1px solid var(--border2);border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,0.5);overflow:hidden;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .15s,transform .15s;z-index:200;max-height:360px;overflow-y:auto;}
.nav-sr.show{opacity:1;transform:translateY(0);pointer-events:all;}
.nav-sr-empty,.nav-sr-loading{padding:18px 16px;font-size:0.85rem;color:var(--muted);text-align:center;}
.nav-sr-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .12s;}
.nav-sr-item:hover{background:rgba(255,255,255,0.05);}
.nav-sr-item img{width:32px;height:32px;border-radius:6px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.nav-sr-name{font-size:0.88rem;font-weight:600;color:var(--text);}
.nav-sr-meta{font-size:0.74rem;color:var(--muted);}
.nav-sr-footer{padding:10px 14px;text-align:center;font-size:0.8rem;font-weight:600;color:var(--accent);border-top:1px solid var(--border);cursor:pointer;transition:background .12s;}
.nav-sr-footer:hover{background:rgba(255,255,255,0.04);}
.nav-uw{position:relative;}
.nav-ut{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid transparent;border-radius:999px;padding:4px 10px 4px 4px;cursor:pointer;transition:background .15s,border-color .15s;}
.nav-ut:hover{background:rgba(255,255,255,0.06);border-color:var(--border);}
.nav-ut img{width:30px;height:30px;border-radius:6px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.nav-ut .trig-n{font-size:0.85rem;font-weight:600;color:var(--text);max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-ut svg{color:var(--muted);transition:transform .15s;flex-shrink:0;}
.nav-uw.open .nav-ut svg{transform:rotate(180deg);}
.nav-um{position:absolute;top:calc(100% + 10px);right:0;width:220px;background:#13161e;border:1px solid var(--border2);border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,0.5);overflow:hidden;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .15s,transform .15s;z-index:200;}
.nav-uw.open .nav-um{opacity:1;transform:translateY(0);pointer-events:all;}
.nav-um-hdr{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--border);}
.nav-um-hdr img{width:38px;height:38px;border-radius:7px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.nav-um-name{font-size:0.92rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-um-sub{font-size:0.74rem;color:var(--gold);}
.nav-um-links{padding:6px;}
.nav-um-link{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:5px;font-size:0.86rem;font-weight:500;color:var(--text);transition:background .12s;}
.nav-um-link:hover{background:rgba(255,255,255,0.06);}
.nav-um-link svg{color:var(--muted);flex-shrink:0;}
.nav-um-div{height:1px;background:var(--border);margin:6px 0;}
.nav-um-link.danger{color:#ef5350;}
.nav-um-link.danger svg{color:#ef5350;}
.nav-gbtn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;padding:7px 16px;cursor:pointer;transition:color .15s,background .15s;}
.nav-gbtn:hover{color:var(--text);background:rgba(255,255,255,0.06);}
.nav-pbtn{background:var(--accent);border:none;border-radius:6px;color:#000;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:700;padding:7px 16px;cursor:pointer;transition:opacity .15s;}
.nav-pbtn:hover{opacity:0.85;}

</style>
</head>
<body>

<div class="panorama-wrap">
  <div class="panorama-track" id="panoramaTrack">
    <img src="/assets/images/panorama.png" alt="" class="panorama-img" id="panoImg1">
    <img src="/assets/images/panorama.png" alt="" class="panorama-img" id="panoImg2">
  </div>
  <div class="panorama-overlay"></div>
</div>

<div class="toast-f" id="fToast"></div>

<div class="confirm-backdrop" id="confirmBackdrop">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle"></div>
    <div class="confirm-body"  id="confirmBody"></div>
    <div class="confirm-actions">
      <button class="confirm-cancel"  id="confirmCancel">Cancel</button>
      <button class="confirm-confirm" id="confirmConfirm">Remove</button>
    </div>
  </div>
</div>

<nav>
  <a href="/" class="nav-logo">
    <img src="/assets/logo.png" alt="LCEN">
    <span class="nav-logo-text">LCE Network</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link"><i style="margin-right: 7px;" class="fa-solid fa-arrow-up-right-from-square"></i>Home</a>
    <a href="/dashboard/" class="nav-link">Dashboard</a>
    <a href="/messages/" class="nav-link">Messages</a>
    <a href="/profile/" class="nav-link">Profile</a>

          <input class="search-input" type="text" id="add-search-input" placeholder="Search by gamertag..." autocomplete="off">

<script src="/assets/app.js"></script>
<script>
(async function() {
  const API = "https://network-server-7kuc.onrender.com";

  function tok()  { return localStorage.getItem("lcen_token"); }
  function myP()  { try { return JSON.parse(localStorage.getItem("lcen_profile")); } catch { return null; } }
  function avUrl(xuid) { return `${API}/avatar/${xuid}`; }

  if (!tok()) { location.href = "/login/"; return; }

  async function api(path, opts = {}) {
    const res = await fetch(`${API}${path}`, {
      ...opts,
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${tok()}`, ...(opts.headers || {}) },
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    return data;
  }

  function toast(msg) {
    const t = document.getElementById("fToast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3000);
  }

  function showConfirm({ title, body, confirmLabel = "Confirm" }) {
    return new Promise(resolve => {
      document.getElementById("confirmTitle").textContent = title;
      document.getElementById("confirmBody").innerHTML   = body;
      document.getElementById("confirmConfirm").textContent = confirmLabel;
      document.getElementById("confirmConfirm").disabled = false;
      const bd = document.getElementById("confirmBackdrop");
      bd.classList.add("visible");

      function cleanup(result) {
        bd.classList.remove("visible");
        document.getElementById("confirmCancel").removeEventListener("click", onNo);
        document.getElementById("confirmConfirm").removeEventListener("click", onYes);
        bd.removeEventListener("click", onBd);
        resolve(result);
      }
      function onNo()  { cleanup(false); }
      function onYes() { cleanup(true); }
      function onBd(e) { if (e.target === bd) cleanup(false); }

      document.getElementById("confirmCancel").addEventListener("click", onNo);
      document.getElementById("confirmConfirm").addEventListener("click", onYes);
      bd.addEventListener("click", onBd);
    });
  }

  const p = myP();
  if (p) {
  }

  document.querySelectorAll(".f-tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".f-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".f-panel").forEach(p => p.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById(`panel-${tab.dataset.tab}`).classList.add("active");
    });
  });

  let friendsData  = [];
  let requestsData = { sent: [], received: [] };

  function getFriendState(xuid) {
    const me = myP();
    if (me && me.xuid === xuid) return "self";
    if (friendsData.some(f => f.xuid === xuid)) return "friends";
    if (requestsData.sent.includes(xuid)) return "pending";
    return "none";
  }

  function friendBtnHTML(xuid) {
    const state = getFriendState(xuid);
    if (state === "self")    return "";
    if (state === "friends") return `<button class="btn-friend-add state-friends" disabled>Friends</button>`;
    if (state === "pending") return `<button class="btn-friend-add state-pending" disabled>Pending</button>`;
    return `<button class="btn-friend-add" data-xuid="${xuid}">Add Friend</button>`;
  }

  function updateBadges() {
    document.getElementById("badge-friends").textContent  = friendsData.length;
    document.getElementById("badge-requests").textContent = requestsData.received.length;
    document.getElementById("badge-sent").textContent     = requestsData.sent.length;
    const rb = document.getElementById("badge-requests");
    if (requestsData.received.length > 0) rb.classList.add("alert");
    else rb.classList.remove("alert");
  }

  async function loadAll() {
    try {
      [friendsData, requestsData] = await Promise.all([
        api("/friends"),
        api("/friends/requests"),
      ]);
    } catch(e) { toast(e.message); return; }
    updateBadges();
    renderFriends();
    renderRequests();
    renderSent();
  }

  function renderFriends() {
    const el = document.getElementById("friends-list-content");
    if (!friendsData.length) {
      el.innerHTML = `<div class="empty-state">
        <svg width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <strong>No friends yet</strong>Use the Add Friend tab to find players.
      </div>`;
      return;
    }
    el.innerHTML = `
      <div class="list-header">${friendsData.length} Friend${friendsData.length !== 1 ? "s" : ""}</div>
      <div class="friends-grid">
        ${friendsData.map(f => `
          <div class="friend-card">
            <img class="friend-card-avatar" src="${avUrl(f.xuid)}" alt="${f.gamertag}" onerror="this.style.display='none'">
            <div class="friend-card-info">
              <a href="/profile/?q=${encodeURIComponent(f.gamertag)}" class="friend-card-gamertag">${f.gamertag}</a>
              <div class="friend-card-gs">${f.gamerscore || 0} Gamerscore</div>
            </div>
            <button class="btn-remove" data-xuid="${f.xuid}">Remove</button>
          </div>
        `).join("")}
      </div>`;

    el.querySelectorAll(".btn-remove").forEach(btn => {
      btn.addEventListener("click", async () => {
        const xuid   = btn.dataset.xuid;
        const friend = friendsData.find(f => f.xuid === xuid);
        const name   = friend?.gamertag ?? "this player";
        const ok = await showConfirm({
          title: "Remove friend",
          body: `Are you sure you want to remove <strong>${name}</strong>? They won't be notified.`,
          confirmLabel: "Remove",
        });
        if (!ok) return;
        btn.disabled = true; btn.textContent = "...";
        try {
          await api(`/friends/${xuid}`, { method: "DELETE" });
          toast("Friend removed");
          await loadAll();
        } catch(e) {
          toast(e.message);
          btn.disabled = false; btn.textContent = "Remove";
        }
      });
    });
  }

  async function fetchProfiles(xuids) {
    const results = await Promise.allSettled(xuids.map(x => api(`/profile/xuid/${x}`)));
    return results.map((r, i) => r.status === "fulfilled" ? r.value : { xuid: xuids[i], gamertag: xuids[i], gamerscore: 0 });
  }

  async function renderRequests() {
    const el = document.getElementById("requests-content");
    if (!requestsData.received.length) {
      el.innerHTML = `<div class="empty-state">
        <svg width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <strong>No pending requests</strong>Incoming friend requests will appear here.
      </div>`;
      return;
    }
    el.innerHTML = `<div class="spinner-inline"></div>`;
    const profiles = await fetchProfiles(requestsData.received);
    el.innerHTML = `
      <div class="list-header">${profiles.length} Incoming Request${profiles.length !== 1 ? "s" : ""}</div>
      ${profiles.map(p => `
        <div class="req-item">
          <img class="req-avatar" src="${avUrl(p.xuid)}" alt="${p.gamertag}" onerror="this.style.display='none'">
          <div class="req-info">
            <div class="req-gamertag">${p.gamertag}</div>
            <div class="req-sub">Wants to be your friend</div>
          </div>
          <div class="req-actions">
            <button class="btn-accept"  data-xuid="${p.xuid}">Accept</button>
            <button class="btn-decline" data-xuid="${p.xuid}">Decline</button>
          </div>
        </div>
      `).join("")}`;

    el.querySelectorAll(".btn-accept").forEach(btn => {
      btn.addEventListener("click", async () => {
        btn.disabled = true; btn.textContent = "...";
        try {
          await api(`/friends/accept/${btn.dataset.xuid}`, { method: "POST" });
          toast("Friend request accepted!");
          await loadAll();
        } catch(e) { toast(e.message); btn.disabled = false; btn.textContent = "Accept"; }
      });
    });

    el.querySelectorAll(".btn-decline").forEach(btn => {
      btn.addEventListener("click", async () => {
        btn.disabled = true; btn.textContent = "...";
        try {
          await api(`/friends/decline/${btn.dataset.xuid}`, { method: "POST" });
          toast("Request declined");
          await loadAll();
        } catch(e) { toast(e.message); btn.disabled = false; btn.textContent = "Decline"; }
      });
    });
  }

  async function renderSent() {
    const el = document.getElementById("sent-content");
    if (!requestsData.sent.length) {
      el.innerHTML = `<div class="empty-state">
        <svg width="38" height="38" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <strong>No sent requests</strong>Pending requests you've sent will appear here.
      </div>`;
      return;
    }
    el.innerHTML = `<div class="spinner-inline"></div>`;
    const profiles = await fetchProfiles(requestsData.sent);
    el.innerHTML = `
      <div class="list-header">${profiles.length} Pending Request${profiles.length !== 1 ? "s" : ""}</div>
      ${profiles.map(p => `
        <div class="req-item">
          <img class="req-avatar" src="${avUrl(p.xuid)}" alt="${p.gamertag}" onerror="this.style.display='none'">
          <div class="req-info">
            <div class="req-gamertag">${p.gamertag}</div>
            <div class="req-sub">Request sent · Awaiting response</div>
          </div>
          <span class="pending-chip">Pending</span>
        </div>
      `).join("")}`;
  }

  let searchTimer = null;
  document.getElementById("add-search-input").addEventListener("input", e => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    const el = document.getElementById("add-search-results");
    if (q.length < 2) { el.innerHTML = ""; return; }
    el.innerHTML = `<div class="spinner-inline"></div>`;
    searchTimer = setTimeout(async () => {
      try {
        const results = await api(`/players/search?q=${encodeURIComponent(q)}&scope=all`);
        if (!results.length) {
          el.innerHTML = `<div class="empty-state" style="padding:28px 0;"><strong>No players found</strong>Try a different gamertag.</div>`;
          return;
        }
        el.innerHTML = results.map(u => `
          <div class="search-result-item">
            <img class="search-result-avatar" src="${avUrl(u.xuid)}" alt="${u.gamertag}" onerror="this.style.display='none'">
            <div class="search-result-info">
              <a href="/profile/?q=${encodeURIComponent(u.gamertag)}" class="search-result-gt">${u.gamertag}</a>
              <div class="search-result-gs">${u.gamerscore || 0} Gamerscore</div>
            </div>
            ${friendBtnHTML(u.xuid)}
          </div>
        `).join("");

        el.querySelectorAll(".btn-friend-add:not([disabled])").forEach(btn => {
          btn.addEventListener("click", async () => {
            const xuid = btn.dataset.xuid;
            btn.disabled = true; btn.textContent = "...";
            try {
              await api(`/friends/request/${xuid}`, { method: "POST" });
              btn.textContent = "Pending";
              btn.className = "btn-friend-add state-pending";
              requestsData.sent.push(xuid);
              updateBadges();
              toast("Friend request sent!");
            } catch(e) {
              toast(e.message);
              btn.disabled = false; btn.textContent = "Add Friend";
            }
          });
        });
      } catch(e) {
        el.innerHTML = `<div class="empty-state" style="padding:28px 0;"><strong>${e.message}</strong></div>`;
      }
    }, 300);
  });

  await loadAll();
})();

(function setupPanorama() {
  const track = document.getElementById("panoramaTrack");
  const img1  = document.getElementById("panoImg1");
  function onLoad() {
    const scale   = (window.innerHeight * 1.04) / img1.naturalHeight;
    const displayW = img1.naturalWidth * scale;
    img1.style.width = `${displayW}px`;
    img1.style.minWidth = "unset";
    document.getElementById("panoImg2").style.width = `${displayW}px`;
    document.getElementById("panoImg2").style.minWidth = "unset";
    const style = document.createElement("style");
    style.textContent = `@keyframes panBg { 0% { transform:translateX(0); } 100% { transform:translateX(-${displayW}px); } }`;
    document.head.appendChild(style);
    track.style.animation = "none";
    track.offsetHeight;
    track.style.animation = `panBg ${displayW / 40}s linear infinite`;
  }
  if (img1.complete) onLoad();
  else img1.addEventListener("load", onLoad);
})();
</script>
<script>
/* ===== shared LCEN nav ===== */
(function(){
const API="https://network-server-7kuc.onrender.com";
function tok(){return localStorage.getItem("lcen_token");}
function prof(){try{return JSON.parse(localStorage.getItem("lcen_profile"));}catch{return null;}}
function avUrl(xuid){return API+"/avatar/"+xuid;}

let _sd=null,_sa=null;

function buildSearch(el){
  const wrap=document.createElement("div");
  wrap.className="nav-search-wrap";
  wrap.innerHTML='<div class="nav-search"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input type="text" placeholder="Search players..." id="_nsi" autocomplete="off"></div><div class="nav-sr" id="_nsr"></div>';
  el.appendChild(wrap);
  const inp=wrap.querySelector("#_nsi"),res=wrap.querySelector("#_nsr");
  inp.addEventListener("input",e=>{
    const q=e.target.value.trim();
    clearTimeout(_sd);
    if(!q){res.classList.remove("show");res.innerHTML="";return;}
    _sd=setTimeout(()=>doSearch(q,res),250);
  });
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"){const q=inp.value.trim();if(q)location.href="/profile/?q="+encodeURIComponent(q);}
    if(e.key==="Escape"){res.classList.remove("show");inp.blur();}
  });
  inp.addEventListener("focus",()=>{if(res.innerHTML.trim())res.classList.add("show");});
  document.addEventListener("click",e=>{if(!wrap.contains(e.target))res.classList.remove("show");});
}

async function doSearch(q,res){
  res.innerHTML='<div class="nav-sr-loading">Searching...</div>';
  res.classList.add("show");
  if(_sa)_sa.abort();
  _sa=new AbortController();
  try{
    let players=[];
    try{
      const d=await fetch(API+"/players/search?q="+encodeURIComponent(q)+"&scope=all",{signal:_sa.signal,headers:tok()?{Authorization:"Bearer "+tok()}:{}}).then(r=>r.json());
      players=Array.isArray(d)?d:d.results||[];
    }catch{players=[];}
    if(!players.length){
      res.innerHTML='<div class="nav-sr-empty">No players found for "'+q+'".</div><div class="nav-sr-footer" id="_nsall">View full search</div>';
    }else{
      res.innerHTML=players.slice(0,6).map(p=>'<div class="nav-sr-item" data-gt="'+p.gamertag+'"><img src="'+avUrl(p.xuid)+'" onerror="this.style.visibility=\'hidden\'"><div><div class="nav-sr-name">'+p.gamertag+'</div><div class="nav-sr-meta">'+(p.gamerscore||0)+' G</div></div></div>').join('')+'<div class="nav-sr-footer" id="_nsall">View full search</div>';
      res.querySelectorAll(".nav-sr-item").forEach(it=>it.addEventListener("click",()=>location.href="/profile/?q="+encodeURIComponent(it.dataset.gt)));
    }
    const va=res.querySelector("#_nsall");
    if(va)va.addEventListener("click",()=>location.href="/profile/?q="+encodeURIComponent(q));
  }catch(e){if(e.name==="AbortError")return;res.innerHTML='<div class="nav-sr-empty">No results.</div>';}
}

function buildUserMenu(el,p){
  const av=avUrl(p.xuid);
  const wrap=document.createElement("div");
  wrap.className="nav-uw";
  wrap.innerHTML='<button class="nav-ut"><img src="'+av+'" onerror="this.style.visibility=\'hidden\'"><span class="trig-n">'+p.gamertag+'</span><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button><div class="nav-um"><div class="nav-um-hdr"><img src="'+av+'" onerror="this.style.visibility=\'hidden\'"><div><div class="nav-um-name">'+p.gamertag+'</div><div class="nav-um-sub">'+(p.gamerscore||0)+' G</div></div></div><div class="nav-um-links"><a href="/profile/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</a><a href="/dashboard/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Dashboard</a><a href="/friends/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Friends</a><a href="/messages/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Messages</a><a href="/plugin/manage" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>Manage Plugins</a><div class="nav-um-div"></div><a href="#" class="nav-um-link danger" id="_nsout"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>Sign Out</a></div></div>';
  wrap.querySelector(".nav-ut").addEventListener("click",e=>{e.stopPropagation();wrap.classList.toggle("open");});
  document.addEventListener("click",e=>{if(!wrap.contains(e.target))wrap.classList.remove("open");});
  wrap.querySelector("#_nsout").addEventListener("click",e=>{e.preventDefault();localStorage.removeItem("lcen_token");localStorage.removeItem("lcen_profile");location.href="/";});
  el.appendChild(wrap);
}

function buildNav(){
  const el=document.getElementById("_nav_actions");
  if(!el)return;
  el.innerHTML="";
  buildSearch(el);
  const p=prof();
  if(p){
    buildUserMenu(el,p);
  }else{
    const si=document.createElement("button");si.className="nav-gbtn";si.textContent="Sign In";si.onclick=()=>location.href="/login/";
    const rg=document.createElement("button");rg.className="nav-pbtn";rg.textContent="Register";rg.onclick=()=>location.href="/register/";
    el.appendChild(si);el.appendChild(rg);
  }
}

if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",buildNav);
else buildNav();
})();

</script>
