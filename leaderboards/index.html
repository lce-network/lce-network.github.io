<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCE Network | Leaderboards</title>
<link rel="icon" href="/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0c10;
  --surface: rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.07);
  --border:  rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text:    #e8eaf0;
  --muted:   #7a8090;
  --accent:  #4fc3f7;
  --accent2: #81c784;
  --gold:    #ffd54f;
  --red:     #ef5350;
  --nav-h:   56px;

  --lb-row-player: rgba(79,195,247,0.08);
  --lb-row-hover:  rgba(255,255,255,0.05);
  --lb-row-1: rgba(255,213,79,0.07);
  --lb-row-2: rgba(192,192,192,0.05);
  --lb-row-3: rgba(205,127,50,0.05);
  --rank-1: #ffd54f;
  --rank-2: #b0bec5;
  --rank-3: #ce9a6a;
}

html, body { min-height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  line-height: 1.5;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }

/* ===== panorama ===== */
.panorama-wrap {
  position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none;
}
.panorama-track {
  display: flex; height: 100%;
  animation: panBg 80s linear infinite;
  will-change: transform;
}
.panorama-img {
  height: 100%; width: auto; min-width: 100vw; object-fit: cover; flex-shrink: 0;
  filter: blur(3px) brightness(0.38) saturate(0.7); transform: scale(1.04);
}
@keyframes panBg { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.panorama-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(10,12,16,0.3) 0%, rgba(10,12,16,0.1) 40%, rgba(10,12,16,0.55) 100%);
}

/* ===== nav ===== */
nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: rgba(10,12,16,0.85);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 28px; gap: 32px; z-index: 100;
}
.nav-logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.nav-logo img { width: 28px; height: 28px; object-fit: contain; }
.nav-logo-text {
  font-family: 'Rajdhani', sans-serif; font-weight: 700;
  font-size: 1.15rem; letter-spacing: 0.04em;
}
.nav-links { display: flex; gap: 4px; flex: 1; }
.nav-link {
  font-family: 'DM Sans', sans-serif; font-size: 0.88rem; font-weight: 500;
  letter-spacing: 0.06em; color: var(--muted);
  padding: 6px 14px; border-radius: 4px;
  transition: color 0.15s, background 0.15s;
}
.nav-link:hover { color: var(--text); background: var(--surface); }
.nav-link.active { color: var(--accent); }

/* ===== page ===== */
.page {
  position: relative; z-index: 1;
  padding-top: calc(var(--nav-h) + 32px);
  padding-bottom: 80px; min-height: 100vh;
}

.lb-wrap {
  max-width: 1020px; margin: 0 auto; padding: 0 24px;
  display: flex; flex-direction: column; gap: 16px;
  animation: fadeUp 0.4s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ===== panel ===== */
.panel {
  background: rgba(10,12,16,0.72);
  border: 1px solid var(--border);
  border-radius: 8px;
  backdrop-filter: blur(12px);
  overflow: hidden;
}

/* ===== controls ===== */
.lb-controls {
  display: flex; flex-direction: column; gap: 10px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}

.lb-controls-row {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}

.lb-controls-row.split {
  justify-content: space-between;
}

.control-label {
  font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted); white-space: nowrap;
}

.seg-group {
  display: flex; gap: 2px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 5px; padding: 2px;
}

.seg-btn {
  border: none; background: transparent;
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: 0.8rem; font-weight: 500;
  padding: 5px 14px; border-radius: 3px; cursor: pointer;
  transition: background 0.12s, color 0.12s; white-space: nowrap;
}

.seg-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }

.seg-btn.active {
  background: rgba(79,195,247,0.15);
  color: var(--accent);
  font-weight: 600;
}

/* ===== table panel header ===== */
.lb-header-panel {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
}

.lb-title-group { display: flex; flex-direction: column; gap: 3px; }

.lb-title {
  font-family: 'Rajdhani', sans-serif; font-size: 1.45rem;
  font-weight: 700; letter-spacing: 0.02em; line-height: 1.1;
}

.lb-subtitle {
  font-size: 0.76rem; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.08em;
}

.lb-entries-badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--muted);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 4px 10px;
}

/* ===== table ===== */
.lb-table { width: 100%; border-collapse: collapse; }

.lb-table thead tr {
  border-bottom: 1px solid var(--border);
}

.lb-table th {
  padding: 10px 14px;
  font-size: 0.72rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); text-align: left;
  white-space: nowrap;
}

.lb-table th.col-rank  { width: 64px; text-align: center; }
.lb-table th.col-name  { min-width: 140px; }
.lb-table th.col-stat  { width: 100px; text-align: right; }
.lb-table th.col-total { width: 110px; text-align: right; color: var(--gold); }

.lb-table th.col-icon {
  width: 100px; text-align: center; padding: 8px 6px;
}

.col-icon-img {
  width: 28px; height: 28px;
  image-rendering: pixelated;
  border-radius: 3px;
  border: 1px solid var(--border2);
  background: rgba(255,255,255,0.05);
  padding: 3px;
  display: inline-block;
  vertical-align: middle;
}

/* ===== table rows — clickable ===== */
.lb-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s, transform 0.1s;
  cursor: pointer;
}

.lb-table tbody tr:last-child { border-bottom: none; }

.lb-table tbody tr:hover {
  background: var(--lb-row-hover);
}

/* Row click ripple feel — subtle translate */
.lb-table tbody tr:active { transform: scaleX(0.995); }

.lb-table tbody tr.rank-1 { background: var(--lb-row-1); }
.lb-table tbody tr.rank-2 { background: var(--lb-row-2); }
.lb-table tbody tr.rank-3 { background: var(--lb-row-3); }
.lb-table tbody tr.is-player { background: var(--lb-row-player) !important; }

/* Highlight the name cell on row hover */
.lb-table tbody tr:hover .td-name-tag { color: var(--accent); }
.lb-table tbody tr:hover .td-name-tag.is-player { color: var(--accent); }

.lb-table td { padding: 11px 14px; font-size: 0.88rem; vertical-align: middle; }

/* ===== rank cell ===== */
.td-rank {
  text-align: center; font-family: 'Rajdhani', sans-serif;
  font-size: 1.1rem; font-weight: 700; width: 64px;
}

.rank-medal {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  font-family: 'Rajdhani', sans-serif; font-size: 0.9rem; font-weight: 700;
}

.rank-medal.m1 { background: rgba(255,213,79,0.15); color: var(--rank-1); border: 1px solid rgba(255,213,79,0.3); }
.rank-medal.m2 { background: rgba(176,190,197,0.12); color: var(--rank-2); border: 1px solid rgba(176,190,197,0.25); }
.rank-medal.m3 { background: rgba(206,154,106,0.12); color: var(--rank-3); border: 1px solid rgba(206,154,106,0.25); }

/* ===== name cell ===== */
.td-name { display: flex; align-items: center; gap: 9px; }

.td-name-avatar {
  width: 26px; height: 26px; border-radius: 3px;
  background: var(--surface2); border: 1px solid var(--border);
  object-fit: cover; flex-shrink: 0;
  transition: border-color 0.15s;
}

.lb-table tbody tr:hover .td-name-avatar {
  border-color: rgba(79,195,247,0.35);
}

.td-name-tag {
  font-family: 'DM Sans', sans-serif; font-weight: 600;
  font-size: 0.88rem; letter-spacing: 0.01em;
  transition: color 0.15s;
}

.td-name-tag.is-player { color: var(--accent); }

/* profile link arrow — appears on hover */
.td-name-arrow {
  margin-left: auto;
  color: var(--muted);
  font-size: 0.7rem;
  opacity: 0;
  transition: opacity 0.15s, transform 0.15s;
  flex-shrink: 0;
}

.lb-table tbody tr:hover .td-name-arrow {
  opacity: 1;
  transform: translateX(2px);
}

.player-badge {
  font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--accent);
  background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.25);
  border-radius: 3px; padding: 1px 5px; flex-shrink: 0;
}

/* ===== stat cells ===== */
.td-stat {
  text-align: right; font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.92rem; font-weight: 600; color: #c8ccd6;
  letter-spacing: 0.02em;
}

.td-total {
  text-align: right; font-family: 'Rajdhani', sans-serif;
  font-size: 1.05rem; font-weight: 700; color: var(--gold);
}

.td-stat.dist, .td-total.dist { color: #a5d6a7; }

/* ===== empty / loading ===== */
.empty-state {
  padding: 48px 20px; text-align: center;
  color: var(--muted); font-size: 0.84rem;
}

.empty-state i {
  font-size: 2rem; margin-bottom: 12px; display: block; opacity: 0.4;
}

.spinner-wrap { padding: 48px; text-align: center; }
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== toast ===== */
.toast-lcen {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(13,16,24,0.95); border: 1px solid var(--border2);
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.84rem; font-weight: 500; padding: 9px 20px;
  border-radius: 6px; z-index: 500; opacity: 0;
  transition: opacity 0.2s, transform 0.2s; pointer-events: none;
  backdrop-filter: blur(8px);
}
.toast-lcen.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== responsive ===== */
@media (max-width: 700px) {
  .lb-controls { gap: 8px; }
  .seg-btn { padding: 5px 9px; font-size: 0.76rem; }
  .col-stat-hide { display: none; }
  .lb-controls-row.split { flex-direction: column; align-items: flex-start; gap: 8px; }
  nav { padding: 0 14px; gap: 16px; }
  .nav-links { display: none; }
}

/* ===== shared nav ===== */
.nav-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-search-wrap{position:relative;}
.nav-search{display:flex;align-items:center;background:rgba(255,255,255,0.06);border-radius:999px;padding:7px 14px;gap:8px;border:1px solid var(--border);transition:border-color .15s,box-shadow .15s;}
.nav-search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,195,247,0.12);}
.nav-search input{border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:0.88rem;color:var(--text);outline:none;width:140px;}
.nav-search input::placeholder{color:var(--muted);}
.nav-search svg{color:var(--muted);flex-shrink:0;}
.nav-sr{position:absolute;top:calc(100% + 10px);left:0;width:280px;background:#13161e;border:1px solid var(--border2);border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,0.5);overflow:hidden;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .15s,transform .15s;z-index:200;max-height:360px;overflow-y:auto;}
.nav-sr.show{opacity:1;transform:translateY(0);pointer-events:all;}
.nav-sr-empty,.nav-sr-loading{padding:18px 16px;font-size:0.85rem;color:var(--muted);text-align:center;}
.nav-sr-item{display:flex;align-items:center;gap:12px;padding:10px 14px;cursor:pointer;transition:background .12s;}
.nav-sr-item:hover{background:rgba(255,255,255,0.05);}
.nav-sr-item img{width:32px;height:32px;border-radius:6px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.nav-sr-name{font-size:0.88rem;font-weight:600;color:var(--text);}
.nav-sr-meta{font-size:0.74rem;color:var(--muted);}
.nav-sr-footer{padding:10px 14px;text-align:center;font-size:0.8rem;font-weight:600;color:var(--accent);border-top:1px solid var(--border);cursor:pointer;transition:background .12s;}
.nav-sr-footer:hover{background:rgba(255,255,255,0.04);}
.nav-uw{position:relative;}
.nav-ut{display:flex;align-items:center;gap:8px;background:transparent;border:1px solid transparent;border-radius:999px;padding:4px 10px 4px 4px;cursor:pointer;transition:background .15s,border-color .15s;}
.nav-ut:hover{background:rgba(255,255,255,0.06);border-color:var(--border);}
.nav-ut img{width:30px;height:30px;border-radius:6px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.nav-ut .trig-n{font-size:0.85rem;font-weight:600;color:var(--text);max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-ut svg{color:var(--muted);transition:transform .15s;flex-shrink:0;}
.nav-uw.open .nav-ut svg{transform:rotate(180deg);}
.nav-um{position:absolute;top:calc(100% + 10px);right:0;width:220px;background:#13161e;border:1px solid var(--border2);border-radius:8px;box-shadow:0 12px 40px rgba(0,0,0,0.5);overflow:hidden;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .15s,transform .15s;z-index:200;}
.nav-uw.open .nav-um{opacity:1;transform:translateY(0);pointer-events:all;}
.nav-um-hdr{display:flex;align-items:center;gap:12px;padding:14px;border-bottom:1px solid var(--border);}
.nav-um-hdr img{width:38px;height:38px;border-radius:7px;object-fit:cover;background:var(--surface);flex-shrink:0;}
.nav-um-name{font-size:0.92rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nav-um-sub{font-size:0.74rem;color:var(--gold);}
.nav-um-links{padding:6px;}
.nav-um-link{display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:5px;font-size:0.86rem;font-weight:500;color:var(--text);transition:background .12s;}
.nav-um-link:hover{background:rgba(255,255,255,0.06);}
.nav-um-link svg{color:var(--muted);flex-shrink:0;}
.nav-um-div{height:1px;background:var(--border);margin:6px 0;}
.nav-um-link.danger{color:#ef5350;}
.nav-um-link.danger svg{color:#ef5350;}
.nav-gbtn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;padding:7px 16px;cursor:pointer;transition:color .15s,background .15s;}
.nav-gbtn:hover{color:var(--text);background:rgba(255,255,255,0.06);}
.nav-pbtn{background:var(--accent);border:none;border-radius:6px;color:#000;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:700;padding:7px 16px;cursor:pointer;transition:opacity .15s;}
.nav-pbtn:hover{opacity:0.85;}
</style>
</head>
<body>

<div class="panorama-wrap">
  <div class="panorama-track" id="panoramaTrack">
    <img src="/assets/images/panorama.png" alt="" class="panorama-img" id="panoImg1">
    <img src="/assets/images/panorama.png" alt="" class="panorama-img" id="panoImg2">
  </div>
  <div class="panorama-overlay"></div>
</div>

<div class="toast-lcen" id="lcenToast"></div>

<nav>
  <a href="/" class="nav-logo">
    <img src="/assets/logo.png" alt="LCEN">
    <span class="nav-logo-text">LCE Network</span>
  </a>
  <div class="nav-links">
    <a href="/" class="nav-link"><i style="margin-right: 7px;" class="fa-solid fa-arrow-up-right-from-square"></i>Home</a>
    <a href="/dashboard/" class="nav-link">Dashboard</a>
    <a href="/messages/" class="nav-link">Messages</a>
    <a href="/profile/" class="nav-link">Profile</a>
    <a href="/friends/" class="nav-link">Friends</a>
    <a href="/plugin/" class="nav-link">Plugins</a>
    <a href="/servers/" class="nav-link">Servers</a>
    <a href="/leaderboards/" class="nav-link active">Leaderboards</a>
  </div>
  <div class="nav-actions" id="_nav_actions"></div>
</nav>

<div class="page">
  <div class="lb-wrap">

    <div class="panel">
      <div class="lb-controls">

        <div class="lb-controls-row split">
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="control-label">Board</span>
            <div class="seg-group" id="typeGroup">
              <button class="seg-btn active" data-type="0">Travelling</button>
              <button class="seg-btn" data-type="1">Mining</button>
              <button class="seg-btn" data-type="2">Farming</button>
              <button class="seg-btn" data-type="3">Kills</button>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="control-label">Filter</span>
            <div class="seg-group" id="filterGroup">
              <button class="seg-btn active" data-filter="top"><i class="fa-solid fa-trophy" style="margin-right:5px;font-size:0.7rem;"></i>Overall</button>
              <button class="seg-btn" data-filter="friends"><i class="fa-solid fa-user-group" style="margin-right:5px;font-size:0.7rem;"></i>Friends</button>
              <button class="seg-btn" data-filter="me"><i class="fa-solid fa-crosshairs" style="margin-right:5px;font-size:0.7rem;"></i>My Score</button>
            </div>
          </div>
        </div>

        <div class="lb-controls-row">
          <span class="control-label">Difficulty</span>
          <div class="seg-group" id="diffGroup">
            <button class="seg-btn" data-diff="0">Peaceful</button>
            <button class="seg-btn" data-diff="1">Easy</button>
            <button class="seg-btn active" data-diff="2">Normal</button>
            <button class="seg-btn" data-diff="3">Hard</button>
          </div>
        </div>

<script src="/assets/app.js"></script>
<script>
// ===== Profile navigation helper =====
// Called by app.js when rendering table rows, or by the patched renderer below.
window.LCEN_goToProfile = function(gamertag, xuid) {
  if (xuid) {
    location.href = '/profile/?xuid=' + encodeURIComponent(xuid);
  } else if (gamertag) {
    location.href = '/profile/?q=' + encodeURIComponent(gamertag);
  }
};

// ===== Patch initLeaderboards to wire up row clicks =====
// We wrap the existing function so that after it renders, we attach click
// handlers to every tbody row that has a data-gamertag or data-xuid attr.
// app.js should set those data attributes on <tr> elements; if it doesn't,
// we fall back to reading the gamertag text from the name cell.
(function () {
  function attachRowClicks() {
    const rows = document.querySelectorAll('#tablePanel tbody tr');
    rows.forEach(function (tr) {
      // Skip if already wired
      if (tr.dataset.clickWired) return;
      tr.dataset.clickWired = '1';

      const gamertag = tr.dataset.gamertag ||
        (tr.querySelector('.td-name-tag') && tr.querySelector('.td-name-tag').textContent.trim()) ||
        null;
      const xuid = tr.dataset.xuid || null;

      if (!gamertag && !xuid) return;

      tr.addEventListener('click', function (e) {
        // Don't navigate if they clicked a link inside the row
        if (e.target.closest('a')) return;
        window.LCEN_goToProfile(gamertag, xuid);
      });

      // Add arrow indicator to name cell if not already present
      const nameCell = tr.querySelector('.td-name');
      if (nameCell && !nameCell.querySelector('.td-name-arrow')) {
        const arrow = document.createElement('i');
        arrow.className = 'fa-solid fa-arrow-up-right-from-square td-name-arrow';
        nameCell.appendChild(arrow);
      }
    });
  }

  // Observe #tablePanel for DOM changes (app.js renders async)
  const observer = new MutationObserver(function () {
    attachRowClicks();
  });

  document.addEventListener('DOMContentLoaded', function () {
    const panel = document.getElementById('tablePanel');
    if (panel) {
      observer.observe(panel, { childList: true, subtree: true });
    }
    // Also run once in case rows are already present
    attachRowClicks();
  });
})();

window.LCEN.initLeaderboards();
</script>
<script>
/* ===== shared LCEN nav ===== */
(function(){
const API="https://network-server-7kuc.onrender.com";
function tok(){return localStorage.getItem("lcen_token");}
function prof(){try{return JSON.parse(localStorage.getItem("lcen_profile"));}catch{return null;}}
function avUrl(xuid){return API+"/avatar/"+xuid;}

let _sd=null,_sa=null;

function buildSearch(el){
  const wrap=document.createElement("div");
  wrap.className="nav-search-wrap";
  wrap.innerHTML='<div class="nav-search"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input type="text" placeholder="Search players..." id="_nsi" autocomplete="off"></div><div class="nav-sr" id="_nsr"></div>';
  el.appendChild(wrap);
  const inp=wrap.querySelector("#_nsi"),res=wrap.querySelector("#_nsr");
  inp.addEventListener("input",e=>{
    const q=e.target.value.trim();
    clearTimeout(_sd);
    if(!q){res.classList.remove("show");res.innerHTML="";return;}
    _sd=setTimeout(()=>doSearch(q,res),250);
  });
  inp.addEventListener("keydown",e=>{
    if(e.key==="Enter"){const q=inp.value.trim();if(q)location.href="/profile/?q="+encodeURIComponent(q);}
    if(e.key==="Escape"){res.classList.remove("show");inp.blur();}
  });
  inp.addEventListener("focus",()=>{if(res.innerHTML.trim())res.classList.add("show");});
  document.addEventListener("click",e=>{if(!wrap.contains(e.target))res.classList.remove("show");});
}

async function doSearch(q,res){
  res.innerHTML='<div class="nav-sr-loading">Searching...</div>';
  res.classList.add("show");
  if(_sa)_sa.abort();
  _sa=new AbortController();
  try{
    let players=[];
    try{
      const d=await fetch(API+"/players/search?q="+encodeURIComponent(q)+"&scope=all",{signal:_sa.signal,headers:tok()?{Authorization:"Bearer "+tok()}:{}}).then(r=>r.json());
      players=Array.isArray(d)?d:d.results||[];
    }catch{players=[];}
    if(!players.length){
      res.innerHTML='<div class="nav-sr-empty">No players found for "'+q+'".</div><div class="nav-sr-footer" id="_nsall">View full search</div>';
    }else{
      res.innerHTML=players.slice(0,6).map(p=>'<div class="nav-sr-item" data-xuid="'+p.xuid+'" data-gt="'+p.gamertag+'"><img src="'+avUrl(p.xuid)+'" onerror="this.style.visibility=\'hidden\'"><div><div class="nav-sr-name">'+p.gamertag+'</div><div class="nav-sr-meta">'+(p.gamerscore||0)+' G</div></div></div>').join('')+'<div class="nav-sr-footer" id="_nsall">View full search</div>';
      // Prefer xuid for nav search results too
      res.querySelectorAll(".nav-sr-item").forEach(it=>it.addEventListener("click",()=>{
        const xuid=it.dataset.xuid;
        const gt=it.dataset.gt;
        if(xuid) location.href="/profile/?xuid="+encodeURIComponent(xuid);
        else location.href="/profile/?q="+encodeURIComponent(gt);
      }));
    }
    const va=res.querySelector("#_nsall");
    if(va)va.addEventListener("click",()=>location.href="/profile/?q="+encodeURIComponent(q));
  }catch(e){if(e.name==="AbortError")return;res.innerHTML='<div class="nav-sr-empty">No results.</div>';}
}

function buildUserMenu(el,p){
  const av=avUrl(p.xuid);
  const wrap=document.createElement("div");
  wrap.className="nav-uw";
  wrap.innerHTML='<button class="nav-ut"><img src="'+av+'" onerror="this.style.visibility=\'hidden\'"><span class="trig-n">'+p.gamertag+'</span><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button><div class="nav-um"><div class="nav-um-hdr"><img src="'+av+'" onerror="this.style.visibility=\'hidden\'"><div><div class="nav-um-name">'+p.gamertag+'</div><div class="nav-um-sub">'+(p.gamerscore||0)+' G</div></div></div><div class="nav-um-links"><a href="/profile/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Profile</a><a href="/dashboard/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>Dashboard</a><a href="/friends/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>Friends</a><a href="/messages/" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Messages</a><a href="/plugin/manage" class="nav-um-link"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>Manage Plugins</a><div class="nav-um-div"></div><a href="#" class="nav-um-link danger" id="_nsout"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>Sign Out</a></div></div>';
  wrap.querySelector(".nav-ut").addEventListener("click",e=>{e.stopPropagation();wrap.classList.toggle("open");});
  document.addEventListener("click",e=>{if(!wrap.contains(e.target))wrap.classList.remove("open");});
  wrap.querySelector("#_nsout").addEventListener("click",e=>{e.preventDefault();localStorage.removeItem("lcen_token");localStorage.removeItem("lcen_profile");location.href="/";});
  el.appendChild(wrap);
}

function buildNav(){
  const el=document.getElementById("_nav_actions");
  if(!el)return;
  el.innerHTML="";
  buildSearch(el);
  const p=prof();
  if(p){
    buildUserMenu(el,p);
  }else{
    const si=document.createElement("button");si.className="nav-gbtn";si.textContent="Sign In";si.onclick=()=>location.href="/login/";
    const rg=document.createElement("button");rg.className="nav-pbtn";rg.textContent="Register";rg.onclick=()=>location.href="/register/";
    el.appendChild(si);el.appendChild(rg);
  }
}

if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",buildNav);
else buildNav();
})();
</script>
</body>
</html>
